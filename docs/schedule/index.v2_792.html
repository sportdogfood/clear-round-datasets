<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tap-Active — Schedule</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#020617;
      --surface: rgba(255,255,255,.05);
      --surface2: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.14);
      --line2: rgba(255,255,255,.20);

      --text: rgba(255,255,255,.98);
      --muted: rgba(255,255,255,.74);

      --accent:#2f6bff;

      --r-2: 12px;
      --r-pill: 999px;

      /* dense-mobile */
      --fs-0: 9.75px;
      --fs-1: 10.5px;
      --fs-2: 11.25px;
      --fs-3: 12px;
      --fs-4: 13px;

      --topbar-h: 48px;
      --nav-h: 62px;
      --peaks-h: 44px;
      --status-h: 44px;
      --horses-h: 104px;

      /* row grammar */
      --pad: 10px;
      --gap: 8px;

      /* class line columns */
      --col-time: 48px;
      --col-num: 38px;
      --col-tag: 38px;
      --col-badge: 48px;

      /* flyup sizing */
      --fly-lift: 60px;
      --fly-minh: 300px;

      /* state colors */
      --st-soon: rgba(77,163,255,1);
      --st-now: rgba(47,107,255,1);
      --st-done: rgba(255,255,255,.40);

    }

    @media (max-width: 380px){
      :root{
        --fs-0: 9.5px;
        --fs-1: 10.25px;
        --fs-2: 11px;
        --fs-3: 11.75px;
        --fs-4: 12.75px;
        --col-time: 48px;
        --col-num: 38px;
      --col-tag: 38px;
        --col-badge: 48px;
      }
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 700px at 50% -20%, rgba(47,107,255,.16), rgba(0,0,0,0) 55%),
        radial-gradient(900px 520px at 10% 0%, rgba(255,255,255,.06), rgba(0,0,0,0) 55%),
        var(--bg);
      color: var(--text);
      overflow:hidden;
    }
    a{ color: inherit; text-decoration:none; }
    [hidden]{ display:none !important; }

    .app{
      width:100%;
      height:100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;

      --status-top: calc(env(safe-area-inset-top) + var(--topbar-h) + 8px);

      --peaks-top: calc(var(--status-top) + var(--status-h) + 8px);
      --horses-bottom: calc(env(safe-area-inset-bottom) + var(--nav-h) + 10px);

      /* MAIN padding (default: filters OFF) */
      --main-top-pad: calc(env(safe-area-inset-top) + var(--topbar-h) + 14px);
      --main-bot-pad: calc(env(safe-area-inset-bottom) + var(--nav-h) + 12px);
    }

    .app.filters--on{
      /* MAIN padding (filters ON: peaks + horses are visible) */
      --main-top-pad: calc(env(safe-area-inset-top) + var(--topbar-h) + var(--status-h) + var(--peaks-h) + 22px);
      --main-bot-pad: calc(env(safe-area-inset-bottom) + var(--nav-h) + var(--horses-h) + 18px);
    }

    .app.filters--bottom{
      /* MAIN padding (bottom filters only: groom + horses visible) */
      --main-top-pad: calc(env(safe-area-inset-top) + var(--topbar-h) + 14px);
      --main-bot-pad: calc(env(safe-area-inset-bottom) + var(--nav-h) + var(--horses-h) + 18px);
    }

    .app.filters--peaks{
      /* MAIN padding (peaks + bottom filters visible; status hidden) */
      --main-top-pad: calc(env(safe-area-inset-top) + var(--topbar-h) + var(--peaks-h) + 18px);
      --main-bot-pad: calc(env(safe-area-inset-bottom) + var(--nav-h) + var(--horses-h) + 18px);
    }



    .app.chrome--hidden{
      --peaks-top: 20px;
      --horses-bottom: 20px;

      /* MAIN padding (filters OFF) */
      --main-top-pad: calc(env(safe-area-inset-top) + 10px);
      --main-bot-pad: calc(env(safe-area-inset-bottom) + 10px);
    }

    .app.filters--on.chrome--hidden{
      /* MAIN padding (filters ON: reclaim topbar/nav only) */
      --main-top-pad: calc(env(safe-area-inset-top) + var(--peaks-h) + 18px);
      --main-bot-pad: calc(env(safe-area-inset-bottom) + var(--horses-h) + 14px);
    }

    /* ---------------------------------------------------------
       TOPBAR (2 buttons + title)
    --------------------------------------------------------- */
    .topbar{
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--topbar-h) + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      z-index: 50;
      background: rgba(7,11,20,.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      transition: transform .18s ease;
    }
    .app.chrome--hidden .topbar{
      transform: translateX(-50%) translateY(calc(-1 * (var(--topbar-h) + env(safe-area-inset-top))));
    }
    .topbar__inner{
      height: var(--topbar-h);
      display:grid;
      grid-template-columns: auto minmax(0,1fr) auto;
      align-items:center;
      padding: 0 var(--pad);
      gap: 10px;
    }
    .tb-btn{
      height: 30px;
      min-width: 56px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.90);
      font-size: var(--fs-2);
      font-weight: 500;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
    }
    .tb-btn:active{ transform: translateY(1px) scale(.995); }
    .tb-btn[disabled]{ opacity:.35; cursor:default; }
    .topbar__c{
      font-size: var(--fs-3);
      font-weight: 500;
      letter-spacing: .01em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
      color: rgba(255,255,255,.92);
      line-height: 1.1;
      user-select:none;
    }

    /* ---------------------------------------------------------
       BOTTOM NAV (no aggs)
    --------------------------------------------------------- */
    .bottomnav{
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 40;
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(7,11,20,.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .18s ease;
    }
    .app.chrome--hidden .bottomnav{
      transform: translateX(-50%) translateY(calc(var(--nav-h) + env(safe-area-inset-bottom) + 6px));
    }
    .nav-grid{
      height: var(--nav-h);
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      justify-items: center;
      gap: 8px;
      padding: 10px var(--pad);
    }
    .nav-btn{
      height: 42px;
      min-width: 62px;
      max-width: 86px;
      width: auto;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.88);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: var(--fs-2);
      font-weight: 600;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
    }
    .nav-btn:active{ transform: translateY(1px) scale(.995); }
    .nav-btn.is-active{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.16);
      color:#fff;
    }

    /* ---------------------------------------------------------
       MAIN scroll + Views
    --------------------------------------------------------- */
    .main{
      position: relative;
      height: 100vh;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding: var(--main-top-pad) var(--pad) var(--main-bot-pad);
      scrollbar-width: none;
    }
    .main::-webkit-scrollbar{ display:none; }

    .view{ display:none; }
    .view.is-active{ display:block; }

    .panel{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: var(--r-2);
      padding: 10px;
    }
    .panel + .panel{ margin-top: 10px; }
    .panel__title{
      font-size: var(--fs-3);
      font-weight: 700;
      color: rgba(255,255,255,.94);
      margin-bottom: 8px;
    }
    
    .panel__spacer{ height: 10px; }
.panel__line{
      display:flex;
      justify-content:space-between;
      gap: 10px;
      font-size: var(--fs-2);
      color: rgba(255,255,255,.82);
      padding: 6px 0;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .panel__line:first-of-type{ border-top: 0; }

    /* ---------------------------------------------------------
       HORSES (Pro toggles)
    --------------------------------------------------------- */
    .horse_search{
      margin: 2px 0 10px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: var(--r-2);
      padding: 8px 10px;
    }
    .horse_input{
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: rgba(255,255,255,.92);
      font-size: var(--fs-3);
      font-weight: 600;
    }
    .horse_input::placeholder{ color: rgba(255,255,255,.46); }

    .horse_group_title{
      margin: 10px 2px 8px;
      font-size: var(--fs-0);
      font-weight: 900;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: rgba(255,255,255,.60);
    }

    /* Legacy-style: rows are individual pill cards with gaps */
    .horse_list{
      display:flex;
      flex-direction:column;
      gap: 10px;
      padding: 0;
      border: 0;
      background: transparent;
      border-radius: 0;
      overflow: visible;
    }

    .horse_row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 14px 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: var(--r-pill);
      font-size: var(--fs-3);
      font-weight: 700;
      color: rgba(255,255,255,.92);
      user-select:none;
      cursor:pointer;
    }
    .horse_row:active{ transform: translateY(1px); }

    .horse_name{
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Toggle dot (active = filled dot, inactive = hollow dot) */
    .horse_toggle{
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.10);
      box-shadow: 0 6px 16px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      flex: 0 0 auto;
    }
    .horse_dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 2px rgba(47,107,255,.14);
    }
    .horse_toggle.is-off{
      box-shadow: none;
      background: rgba(255,255,255,.02);
    }
    .horse_toggle.is-off .horse_dot{
      background: transparent;
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: none;
    }

    /* ---------------------------------------------------------
       PEAKS (Status + Ring peaks)
    --------------------------------------------------------- */
/* ---------------------------------------------------------
       STATUS (Global status filter) — sits below topbar
    --------------------------------------------------------- */
    .statusWrap{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: var(--status-top);
      width: 100%;
      max-width: 480px;
      z-index: 47;
      padding: 0 var(--pad);
      pointer-events: none;
      transition: transform .18s ease, opacity .18s ease;
    }
    .status{
      pointer-events: auto;
      border-radius: var(--r-2);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px;
    }
    .app.chrome--hidden .statusWrap{
      transform: translateX(-50%) translateY(calc(-1 * (var(--status-h) + 18px)));
      opacity: 0;
    }

    .peaksWrap{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: var(--peaks-top);
      width: 100%;
      max-width: 480px;
      z-index: 46;
      padding: 0 var(--pad);
      transition: top .18s ease;
      pointer-events: none;
    }
    .peaks{
      pointer-events: auto;
      border-radius: var(--r-2);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px;
      display:grid;
      gap: 8px;
    }
    .statusbar,
    .peakbar{
      display:flex;
      gap: 8px;
      align-items:center;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .statusbar::-webkit-scrollbar,
    .peakbar::-webkit-scrollbar{ display:none; }

    /* sbtn + peakbtn share the same chip base */
    .sbtn,
    .peakbtn{
      height: 26px;
      min-width: 44px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.88);
      font-size: var(--fs-2);
      font-weight: 700;
      letter-spacing: .01em;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 6px;
      user-select:none;
      cursor:pointer;
      line-height: 1;
      white-space:nowrap;
    }
    .sbtn:active,
    .peakbtn:active{ transform: translateY(1px) scale(.995); }

    /* Global status buttons: icon-only (labels hidden), neutral when off */
    .sbtn[data-global-status]{
      min-width: 34px;
      padding: 0 8px;
    }
    .sbtn[data-global-status] > span:not(.ico){ display:none; }

    /* Only the selected state carries color */
    .sbtn.is-on{ color:#fff; }
    .sbtn.is-on[data-global-status="U"]{ border-color: rgba(77,163,255,.78); background: rgba(77,163,255,.26); }
    .sbtn.is-on[data-global-status="L"]{ border-color: rgba(47,107,255,.82); background: rgba(47,107,255,.28); }
    .sbtn.is-on[data-global-status="C"]{ border-color: rgba(255,255,255,.24); background: rgba(255,255,255,.10); }

    .peakbtn{ flex: 0 0 auto; }
    .peakbtn.is-active{ border-color: rgba(47,107,255,.65); background: rgba(47,107,255,.18); color:#fff; }

    /* ---------------------------------------------------------
       HORSES (filter chips)
    --------------------------------------------------------- */
    .horsesWrap{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: var(--horses-bottom);
      width: 100%;
      max-width: 480px;
      z-index: 44;
      padding: 0 var(--pad);
      transition: bottom .18s ease;
      pointer-events: none;
    }
    .horses{
      pointer-events: auto;
      border-radius: var(--r-2);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px;
    }
    .horsebar{
      display:flex;
      gap: 8px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .horsebar::-webkit-scrollbar{ display:none; }
    .hchip{
      flex: 0 0 auto;
      height: 26px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-size: var(--fs-2);
      font-weight: 600;
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
    }
    .hchip:active{ transform: translateY(1px) scale(.995); }
    .hchip.is-on{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.16);
      color:#fff;
    }

    /* ---------------------------------------------------------
       RINGS / CLASSES / ENTRIES
    --------------------------------------------------------- */
    .rings_container{
      display:grid;
      gap: 12px;
    }
    .ring_card{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      border-radius: var(--r-2);
      overflow:hidden;
    }

    /* Ring head: title + 2 buttons */
    .ring_line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }
    .ring_title{
      font-size: var(--fs-3);
      font-weight: 700;
      color: rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
    }
    .ring_actions{
      display:flex;
      white-space:nowrap;
      flex-wrap:nowrap;
      gap: 6px;
      align-items:center;
      flex: 0 0 auto;
    }
    .ring_btn{
      height: 26px;
      min-width: 46px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.88);
      font-size: var(--fs-2);
      font-weight: 700;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .ring_btn--icon{
      width: 28px;
      min-width: 28px;
      padding: 0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 0;
    }
    .ring_btn[data-state]{
      border-color: rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
    }
    .ring_btn--icon{ box-shadow: 0 6px 16px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.06); }

    .ring_btn.is-on[data-state="soon"]{ border-color: rgba(77,163,255,.92); background: rgba(77,163,255,.34); color:#fff; }
    .ring_btn.is-on[data-state="now"]{ border-color: rgba(47,107,255,.96); background: rgba(47,107,255,.36); color:#fff; }
    .ring_btn.is-on[data-state="done"]{ border-color: rgba(255,255,255,.34); background: rgba(255,255,255,.14); color:#fff; }

    .ring_btn:active{ transform: translateY(1px) scale(.995); }

    /* group wrapper */
    .group_wrap{
      padding: 6px 0 10px;
      display:grid;
      gap: 8px;
    }

    /* Class line: time | number | name | badge (all divs, fixed mins) */
    .class_card{ border-top: 1px solid rgba(255,255,255,.06); }
    .class_card:first-child{ border-top: 0; }

    .class_line{
      position: relative;
      width:100%;
      display:grid;
      grid-template-columns: var(--col-time) var(--col-num) minmax(0,1fr) var(--col-tag) var(--col-badge);
      gap: 6px;
      align-items:center;
      padding: 8px 10px 6px;
      cursor:pointer;
      user-select:none;
    }
    .class_line:active{ transform: translateY(1px); }

    
    .c_time{
      min-width: var(--col-time);
      font-size: var(--fs-1);
      color: rgba(255,255,255,.70);
      font-variant-numeric: tabular-nums;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
    }
    .c_num{
      min-width: var(--col-num);
      font-size: var(--fs-1);
      color: rgba(255,255,255,.78);
      font-variant-numeric: tabular-nums;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
      font-weight: 700;
    }
    .c_tag{
      min-width: var(--col-tag);
      font-size: var(--fs-0);
      color: rgba(255,255,255,.56);
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
    }

    .c_name{
      min-width: 0;
      line-height: 1.1;
    }
    .c_name_main{
      font-size: var(--fs-3);
      font-weight: 600;
      color: rgba(255,255,255,.96);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .c_name_sub{
      margin-top: 3px;
      font-size: var(--fs-1);
      font-weight: 600;
      color: rgba(255,255,255,.54);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .c_badge{
      min-width: var(--col-badge);
      display:flex;
      justify-content:flex-end;
      align-items:center;
    }
    .badge{
      height: 22px;
      min-width: 48px;
      width: 48px;
      padding: 0;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.92);
      font-size: var(--fs-1);
      font-weight: 800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 0px;
      white-space:nowrap;
      line-height: 1;
      text-transform: uppercase;
    }
    .badge--upcoming{ border-color: rgba(77,163,255,.35); background: rgba(77,163,255,.10); }
    .badge--underway{ border-color: rgba(47,107,255,.40); background: rgba(47,107,255,.14); }
    .badge--completed{ border-color: rgba(255,255,255,.14); background: rgba(255,255,255,.06); color: rgba(255,255,255,.70); }

    /* Rollup line: full width + horizontal scroll (hidden if empty) */
    .rollup_line{ display:block; padding: 8px var(--pad); border-top:1px solid rgba(255,255,255,.06); }
    .rollup_spacer{
      min-width: var(--col-time);
      height: 1px;
    }
    .rollup_scroller{ display:flex; justify-content:flex-start; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
    .rollup_scroller::-webkit-scrollbar{ display:none; }
    .rollup_scroller::-webkit-scrollbar{ display:none; }

    .epill{
      height: 26px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-size: var(--fs-1);
      font-weight: 700;
      user-select:none;
      display:grid;
      grid-template-columns: minmax(0,1fr) 10px 7ch 10px 6ch;
      gap: 6px;
      align-items:center;
      line-height: 1;
      flex: 0 0 auto;
      white-space:nowrap;
      text-align:left;
    }
    .epill__name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .epill__sep{
      text-align:center;
      color: rgba(255,255,255,.36);
      font-weight: 900;
    }
    .epill__oog{
      text-align:center;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,.82);
    }
    .epill{ box-shadow: 0 8px 20px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.06); }
    .epill[data-status]{ border-color: rgba(255,255,255,.14); background: rgba(255,255,255,.05); }

    /* Epill text tint by status */
    .epill[data-status="U"] .epill__oog,
    .epill[data-status="U"] .epill__time{ color: rgba(77,163,255,.96); }
    .epill[data-status="L"] .epill__oog,
    .epill[data-status="L"] .epill__time{ color: rgba(47,107,255,.98); }
    .epill[data-status="C"] .epill__oog,
    .epill[data-status="C"] .epill__time{ color: rgba(255,255,255,.78); }


    .epill__time{
      text-align:right;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,.82);
    }

    button.epill{ cursor:pointer; }
    button.epill:active{ transform: translateY(1px) scale(.995); }

    .epill--disabled{
      cursor: default;
      opacity: .85;
    }

    .is-hidden{ display:none !important; }

    /* ---------------------------------------------------------
       FLYUP (lines, not label-over-value)
    --------------------------------------------------------- */
    .fly{
      position: fixed;
      inset: 0;
      z-index: 1000;
      display:none;
    }
    .fly.is-open{ display:block; }
    .fly_backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.55);
    }
    .fly_sheet{
      position:absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: var(--fly-lift);
      width: 100%;
      max-width: 480px;
      min-height: var(--fly-minh);
      max-height: calc(100% - var(--fly-lift) - 10px);
      overflow: auto;
      border-radius: 16px 16px 0 0;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(7,11,20,.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 0 0 calc(env(safe-area-inset-bottom) + 26px);
    }
    .fly_bar{
      display:grid;
      grid-template-columns: 48px minmax(0,1fr) 48px;
      align-items:center;
      gap: 10px;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
    }
    .fly_title{
      text-align:center;
      font-size: var(--fs-3);
      font-weight: 700;
      color: rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
      user-select:none;
    }
    .fly_body{ padding: 10px 12px 0; }

    .fly_lines{
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      border-radius: 12px;
      overflow:hidden;
    }
    .fly_line{
      display:grid;
      grid-template-columns: 48px 38px minmax(0,1fr) 38px 48px;
      gap: 8px;
      align-items:center;
      padding: 10px 10px;
      font-size: var(--fs-2);
      color: rgba(255,255,255,.86);
      font-variant-numeric: tabular-nums;
    }
    .fly_line:nth-child(odd){ background: rgba(255,255,255,.02); }
    .fly_line:nth-child(even){ background: rgba(255,255,255,.04); }
    .fly_cell{
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .fly_cell--c1{
      color: rgba(255,255,255,.54);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      text-align:center;
    }
    .fly_cell--c2{
      text-align:center;
      font-weight: 800;
      color: rgba(255,255,255,.88);
    }
    .fly_cell--c3{
      font-weight: 700;
      color: rgba(255,255,255,.92);
    }
    .fly_cell--c4{
      text-align:center;
      font-weight: 800;
      color: rgba(255,255,255,.80);
    }
    .fly_cell--c5{
      text-align:right;
      font-weight: 900;
      color: rgba(255,255,255,.92);
    }

    .fly_head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 8px;
    }
    .fly_title{
      font-size: var(--fs-3);
      font-weight: 800;
      color: rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
    }
    .fly_close{
      height: 32px;
      min-width: 72px;
      padding: 0 12px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.88);
      font-size: var(--fs-2);
      font-weight: 800;
      cursor:pointer;
      user-select:none;
    }
    .fly_close:active{ transform: translateY(1px) scale(.995); }

    .fly_body{ display:grid; gap: 10px; }
    .fly_group{
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      border-radius: 12px;
      padding: 10px;
      display:grid;
      gap: 8px;
    }
    .fly_row{
      display:grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 10px;
      align-items:baseline;
      font-size: var(--fs-2);
      color: rgba(255,255,255,.86);
    }
    .fly_l{
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight: 700;
      color: rgba(255,255,255,.90);
    }
    .fly_r{
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      color: rgba(255,255,255,.92);
      white-space:nowrap;
    }

    
    /* Icons (inline SVG) */
    .ico{ display:inline-flex; align-items:center; justify-content:center; width:12px; height:12px; }
    .ico svg{ width:12px; height:12px; display:block; }

    /* Flyup header buttons */
    .fly_actions{ display:flex; gap:8px; align-items:center; }
    .fly_btn{
      height: 28px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.90);
      font-size: var(--fs-1);
      font-weight: 700;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      line-height: 1;
      white-space:nowrap;
      text-transform: uppercase;
      letter-spacing: .02em;
    }
    .fly_btn--icon{
      width: 28px;
      padding: 0;
      justify-content:center;
    }
    .fly_btn:active{ transform: translateY(1px) scale(.995); }
    .fly_btn_txt{ display:inline-block; }

    /* Flyup rows: locked 3-column contract */
    .fly_label{
      font-size: var(--fs-0);
      font-weight: 700;
      color: rgba(255,255,255,.56);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding-top: 2px;
    }
    .fly_row3{
      display:flex;
      gap: 10px;
      align-items:baseline;
      font-size: var(--fs-2);
      color: rgba(255,255,255,.86);
      font-variant-numeric: tabular-nums;
      --fly-side: 48px;
    }
    .fly_c1,.fly_c3{
      flex: 0 0 var(--fly-side);
      min-width: var(--fly-side);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight: 700;
      color: rgba(255,255,255,.92);
    }
    .fly_c2{
      flex: 1 1 auto;
      min-width: 0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight: 600;
      color: rgba(255,255,255,.90);
    }

    /* Start vs Go tint */
    .t-start{ color: rgba(255,255,255,.88); }
    .t-go{ color: rgba(47,107,255,.95); }

/* Focus */
    :is(.sbtn,.peakbtn,.hchip,.nav-btn,.epill,.fly_btn,.tb-btn,.ring_btn):focus-visible{
      outline: 2px solid rgba(47,107,255,.95);
      outline-offset: 2px;
    }
  
    /* row-tap (Start) */
    .rowtap{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      border-radius: var(--r-2);
      padding: 12px 14px;
      margin-top: 10px;
      color: var(--text);
      cursor:pointer;
      user-select:none;
    }
    .rowtap:active{ transform: translateY(1px); }
    .rowtap__main{ min-width:0; }
    .rowtap__title{
      font-weight: 800;
      font-size: 16px;
      letter-spacing: .01em;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rowtap__sub{
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255,255,255,.72);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rowtap__dot{
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.22);
      flex: 0 0 auto;
    }

    .panel__link{
      display:inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,.72);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor:pointer;
      user-select:none;
    }

    /* Groom chips (above horse chips) */
    .groombar{
      display:flex;
      gap: 8px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
      margin-bottom: 8px;
    }
    .groombar::-webkit-scrollbar{ display:none; }
    .gchip{
      flex: 0 0 auto;
      height: 34px;
      padding: 0 12px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .01em;
      cursor:pointer;
      user-select:none;
      line-height: 1;
    }
    .gchip.is-on{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.18);
      color:#fff;
    }

    /* Time view list spacing */
    #time_card{ margin-top: 10px; }

    /* Full view: hide status controls/badge, expand name */
    #view-full .c_badge{ display:none; }
    #view-full .class_line{
      grid-template-columns: var(--col-time) var(--col-num) minmax(0,1fr) var(--col-tag);
    }
    #view-full .ring_actions{ display:none; }

  </style>
</head>

<body>
  <div class="app" id="app">
    <div class="topbar" id="topbar">
      <div class="topbar__inner">
        <button class="tb-btn" type="button" id="btnBack" disabled>Back</button>
        <div class="topbar__c" id="topTitle">Schedule</div>
        <button class="tb-btn" type="button" id="btnRefresh">Home</button>
      </div>
    </div>

    

    <div class="statusWrap" id="statusWrap">
      <div class="status">
        <div class="statusbar" aria-label="Global status filter">
          <button class="sbtn" type="button" data-global-status="U" title="Upcoming"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span><span>Soon</span></button>
          <button class="sbtn" type="button" data-global-status="L" title="Underway"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 12-14h-7l1-6z"/></svg></span><span>Now</span></button>
          <button class="sbtn" type="button" data-global-status="C" title="Completed"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12l2 2 6-6"/></svg></span><span>Done</span></button>
        </div>
      </div>
    </div>
<div class="peaksWrap" id="peaksWrap">
      <div class="peaks">
        <div class="peakbar" id="peakbar" aria-label="Ring peaks"></div>
      </div>
    </div>

    <div class="horsesWrap" id="horsesWrap">
      <div class="horses">
        <div class="groombar" id="groombar" aria-label="Groom filter chips"></div>
        <div class="horsebar" id="horsebar" aria-label="Horse filter chips"></div>
      </div>
    </div>

    <div class="main" id="main">
      <div class="view is-active" id="view-start">
        <div class="panel">
          <div class="panel__title">Start</div>
          <button class="rowtap" id="startRowPro" type="button">
            <div class="rowtap__main">
              <div class="rowtap__title">RingStatus.com</div>
              <div class="rowtap__sub">Your Show Day Schedule - Fast!</div>
            </div>
            <div class="rowtap__dot" aria-hidden="true"></div>
          </button>

          <button class="rowtap" id="startRowHorses" type="button">
            <div class="rowtap__main">
              <div class="rowtap__title">Active Horses</div>
            </div>
            <div class="rowtap__dot" aria-hidden="true"></div>
          </button>

          <a class="panel__link" href="#" id="startDetailsLink">Session details</a>

          <div id="startPanelData" hidden>

          <div class="panel__line"><div>Status</div><div id="start_status">Loading…</div></div>
          <div class="panel__line"><div>Last refresh</div><div id="start_refresh">—</div></div>
          <div class="panel__line"><div>Trips</div><div id="start_trips">—</div></div>
          <div class="panel__line"><div>Full classes</div><div id="start_classes">—</div></div>
          <div class="panel__line"><div>Threads</div><div id="start_threads">—</div></div>
        
          </div>
</div>
      </div>

      <div class="view" id="view-summary">

        <div class="ring_card" id="time_card">
          <div class="ring_line">
            <div class="ring_title">Time</div>
          </div>
          <div class="group_wrap" id="time_container"></div>
        </div>

        <div class="panel">
          <div class="panel__title">Time</div>
          <div class="panel__line"><div>Underway</div><div id="sum_underway">—</div></div>
          <div class="panel__line"><div>Upcoming</div><div id="sum_upcoming">—</div></div>
          <div class="panel__line"><div>Completed</div><div id="sum_completed">—</div></div>
        
          <div class="panel__spacer"></div>

          <div class="panel__title" style="margin-top:10px;">Time Range</div>
          <div class="panel__line" style="gap:8px;">
            <div style="display:flex; gap:8px; width:100%; justify-content:flex-end;">
              <button class="sbtn" type="button" id="range_1">1H</button>
              <button class="sbtn is-on" type="button" id="range_3">3H</button>
              <button class="sbtn" type="button" id="range_all">ALL</button>
            </div>
          </div>

          <div class="panel__title" style="margin-top:10px;">Compare</div>
          <div class="panel__line">
            <div>Compare button</div>
            <button class="sbtn" type="button" id="btnCompare">Compare</button>
          </div>

          <div class="panel__title" style="margin-top:10px;">Pills / Badges</div>
          <div class="panel__line" style="gap:8px;">
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <div class="badge badge--upcoming"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span><span>Soon</span></div>
              <div class="badge badge--underway"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 12-14h-7l1-6z"/></svg></span><span>Now</span></div>
              <div class="badge badge--completed"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12l2 2 6-6"/></svg></span><span>Done</span></div>
            </div>
          </div>

          <div class="panel__title" style="margin-top:10px;">Top Movers</div>
          <div class="panel__table" id="moversTable" style="margin-top:6px;">
            <div class="panel__line" style="opacity:.7; display:grid; grid-template-columns:minmax(0,1fr) 44px 52px 80px; gap:10px;">
              <div>Horse</div><div>Ring</div><div>OOG</div><div>GO</div>
            </div>
            <div id="moversBody"></div>
          </div>
</div>
        </div>

      <div class="view" id="view-lite">
        <div class="rings_container" id="rings_container_lite"></div>
      </div>

      <div class="view" id="view-full">
        <div class="rings_container" id="rings_container_full"></div>
      </div>

      <div class="view" id="view-threads">
        <div class="panel">
          <div class="panel__title">Threads</div>
          <div id="threads_container"></div>
        </div>
      </div>

      <div class="view" id="view-horses">
        <div class="panel">
          <div class="panel__title">Horses</div>
          <div id="horses_container"></div>
        </div>
      </div>

    </div>

    <div class="bottomnav" id="bottomnav">
      <div class="nav-grid" aria-label="Bottom navigation">
        <div class="nav-btn is-active" data-view="start">Start</div>
        <div class="nav-btn" data-view="summary">Time</div>
        <div class="nav-btn" data-view="lite">Pro</div>
        <div class="nav-btn" data-view="full">Full</div>
        <div class="nav-btn" data-view="threads">Threads</div>
        <div class="nav-btn" data-view="horses">Horses</div>
      </div>
    </div>

    <div class="fly" id="fly">
      <div class="fly_backdrop" id="flyBackdrop"></div>
      <div class="fly_sheet" role="dialog" aria-modal="true" aria-label="Details">
        <div class="fly_bar" aria-label="Flyup header">
          <button class="ring_btn ring_btn--icon" type="button" id="flySMS" aria-label="SMS" title="SMS">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
              </svg>
            </span>
          </button>
          <div class="fly_title" id="flyTitle">Details</div>
          <button class="ring_btn ring_btn--icon" type="button" id="flyClose" aria-label="Close" title="Close">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </span>
          </button>
        </div>
        <div class="fly_body" id="flyBody"></div>
      </div>
    </div>
  </div>

  <script src="./app.v2_792.js"></script>
</body>
</html>
