<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ring Status</title>
  <style>
    :root{
      --bg:#020617;
      --fg:#f9fafb;
      --muted:#9ca3af;
      --muted2:#6b7280;
      --stroke:rgba(148,163,184,.22);
      --surface:rgba(15,23,42,.72);
      --surface2:rgba(17,24,39,.68);
      --chip:rgba(30,41,59,.85);
      --chipOn:rgba(37,99,235,.28);
      --accent:#60a5fa;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --radius:16px;
      --pill:999px;
      --topbarH:54px;
      --bottomH:62px;
      --pad:12px;

      /* Ribbon palette (typical H/J) */
      --rb1:#2563eb; /* blue */
      --rb2:#dc2626; /* red */
      --rb3:#facc15; /* yellow */
      --rb4:#f9fafb; /* white */
      --rb5:#f472b6; /* pink */
      --rb6:#16a34a; /* green */
      --rb7:#7c3aed; /* purple */
      --rb8:#8b5a2b; /* brown */
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--fg);
      background:
        radial-gradient(900px 500px at 30% -10%, rgba(37,99,235,.22), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(16,185,129,.14), transparent 55%),
        radial-gradient(900px 600px at 10% 110%, rgba(251,191,36,.10), transparent 55%),
        var(--bg);
      overflow:hidden;
    }

    .app{height:100%; display:flex; flex-direction:column;}

    .topbar{
      height:var(--topbarH);
      display:grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items:center;
      padding:0 var(--pad);
      border-bottom:1px solid var(--stroke);
      background:rgba(2,6,23,.78);
      backdrop-filter: blur(10px);
    }
    .topbar__btn{
      justify-self:start;
      background:transparent;
      border:1px solid var(--stroke);
      color:var(--fg);
      padding:8px 10px;
      border-radius:12px;
      font-size:12px;
    }
    .topbar__btn.right{justify-self:end;}
    .topbar__title{justify-self:center; font-weight:700; letter-spacing:.2px;}
    .topbar__sub{justify-self:center; font-size:11px; color:var(--muted); margin-top:-2px;}

    .peaks-wrap{padding:10px var(--pad) 6px; border-bottom:1px solid var(--stroke); background:rgba(2,6,23,.55);}
    .peaks{display:flex; gap:8px; overflow:auto; padding-bottom:6px;}
    .peak{
      flex:0 0 auto;
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.55);
      color:var(--fg);
      padding:8px 10px;
      border-radius:var(--pill);
      font-size:12px;
      white-space:nowrap;
    }
    .peak.is-on{background:rgba(37,99,235,.26); border-color:rgba(96,165,250,.45);}

    .filters{display:flex; gap:8px; align-items:center; justify-content:space-between;}
    .filterbar{display:flex; gap:8px; overflow:auto; padding-bottom:4px;}
    .fbtn{
      flex:0 0 auto;
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.55);
      color:var(--fg);
      padding:7px 10px;
      border-radius:var(--pill);
      font-size:12px;
      white-space:nowrap;
    }
    .fbtn.is-on{background:rgba(96,165,250,.20); border-color:rgba(96,165,250,.42);}

    .horses-wrap{padding:10px var(--pad) 10px; border-bottom:1px solid var(--stroke); background:rgba(2,6,23,.45);}
    .horses{display:flex; gap:8px; overflow:auto;}
    .chip{
      flex:0 0 auto;
      border:1px solid var(--stroke);
      background:var(--chip);
      color:var(--fg);
      padding:7px 10px;
      border-radius:var(--pill);
      font-size:12px;
      white-space:nowrap;
    }
    .chip.is-on{background:var(--chipOn); border-color:rgba(96,165,250,.42);}

    .main{
      flex:1;
      overflow:auto;
      padding:10px var(--pad) calc(var(--bottomH) + 12px);
    }

    .view{display:none;}
    .view.is-on{display:block;}

    .stack{display:flex; flex-direction:column; gap:10px;}

    .card{
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      background:var(--surface);
      box-shadow: 0 12px 40px rgba(0,0,0,.28);
      overflow:hidden;
    }
    .card__hd{
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 12px;
      border-bottom:1px solid var(--stroke);
      background:rgba(2,6,23,.35);
    }
    .card__title{font-weight:700; font-size:13px;}
    .card__meta{font-size:11px; color:var(--muted);}

    .ring-badge{font-size:11px; color:var(--muted);}

    .rows{display:flex; flex-direction:column;}

    .row{
      display:grid;
      grid-template-columns: 88px 1fr 56px;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-top:1px solid rgba(148,163,184,.14);
    }
    .row--tap{cursor:pointer;}
    .row--tap:active{background:rgba(96,165,250,.10)}

    .row__l{font-variant-numeric: tabular-nums; font-size:12px; color:var(--muted);}
    .row__m{min-width:0;}
    .row__r{text-align:right; font-size:11px; color:var(--muted2);}

    .line1{font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .line2{font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}

    .row--entries{
      grid-template-columns: 88px 1fr 56px;
      padding-top:8px;
      padding-bottom:12px;
      background:rgba(2,6,23,.18);
    }

    .pills{display:flex; gap:6px; flex-wrap:wrap;}
    .pill{
      border:1px solid rgba(148,163,184,.22);
      background:rgba(15,23,42,.55);
      color:var(--fg);
      padding:6px 9px;
      border-radius:var(--pill);
      font-size:12px;
      line-height:1;
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
    }
    .pill[aria-disabled="true"]{cursor:default; opacity:.78;}

    /* status shading */
    .card[data-status="U"]{background:rgba(15,23,42,.70);}
    .card[data-status="L"]{background:rgba(17,24,39,.70); border-color:rgba(96,165,250,.30);}
    .card[data-status="C"]{background:rgba(17,24,39,.55); opacity:.86;}

    /* ribbon placing (1-8) */
    .pill[data-place="1"]{border-color:var(--rb1)}
    .pill[data-place="2"]{border-color:var(--rb2)}
    .pill[data-place="3"]{border-color:var(--rb3)}
    .pill[data-place="4"]{border-color:var(--rb4)}
    .pill[data-place="5"]{border-color:var(--rb5)}
    .pill[data-place="6"]{border-color:var(--rb6)}
    .pill[data-place="7"]{border-color:var(--rb7)}
    .pill[data-place="8"]{border-color:var(--rb8)}

    .bottom-nav{
      height:var(--bottomH);
      border-top:1px solid var(--stroke);
      background:rgba(2,6,23,.78);
      backdrop-filter: blur(10px);
      display:grid;
      grid-template-columns: repeat(5, 1fr);
    }
    .nav-btn{
      background:transparent;
      border:0;
      color:var(--muted);
      font-size:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
      cursor:pointer;
    }
    .nav-btn.is-on{color:var(--fg);}

    /* Flyup */
    .fly{
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background:rgba(0,0,0,.55);
      z-index:50;
    }
    .fly.is-on{display:flex;}
    .fly__sheet{
      width:min(640px, 100%);
      max-height:86vh;
      background:rgba(2,6,23,.94);
      border:1px solid var(--stroke);
      border-radius: 20px 20px 0 0;
      overflow:hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
    }
    .fly__hd{display:flex; justify-content:space-between; align-items:center; padding:12px 12px; border-bottom:1px solid var(--stroke);}
    .fly__title{font-weight:800; font-size:14px;}
    .fly__close{background:transparent; border:1px solid var(--stroke); color:var(--fg); padding:8px 10px; border-radius:12px; font-size:12px;}
    .fly__body{padding:12px; overflow:auto; max-height: calc(86vh - 54px);}
    .kv{display:grid; grid-template-columns: 1fr 1fr; gap:8px;}
    .kv__item{border:1px solid rgba(148,163,184,.16); background:rgba(15,23,42,.55); border-radius:14px; padding:10px;}
    .kv__k{font-size:10px; color:var(--muted); letter-spacing:.2px; text-transform:uppercase;}
    .kv__v{font-size:13px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

    .mono{font-variant-numeric: tabular-nums;}

    .empty{
      border:1px dashed rgba(148,163,184,.25);
      border-radius:var(--radius);
      padding:14px;
      color:var(--muted);
      background:rgba(15,23,42,.35);
    }

    @media (min-width: 820px){
      body{display:flex; justify-content:center;}
      .app{width: 620px; border-left:1px solid rgba(148,163,184,.12); border-right:1px solid rgba(148,163,184,.12);}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <button class="topbar__btn" id="btnBack" type="button" style="visibility:hidden">Back</button>
      <div style="text-align:center; line-height:1.05;">
        <div class="topbar__title" id="topTitle">Ring Status</div>
        <div class="topbar__sub" id="topSub"></div>
      </div>
      <button class="topbar__btn right" id="btnRefresh" type="button">Refresh</button>
    </header>

    <div class="peaks-wrap" id="peaksWrap">
      <div class="peaks" id="peaks"></div>
      <div class="filters" style="margin-top:6px;">
        <div class="filterbar" id="statusFilters"></div>
      </div>
    </div>

    <div class="horses-wrap" id="horsesWrap">
      <div class="horses" id="horses"></div>
    </div>

    <main class="main" id="main">
      <section class="view" id="viewStart"></section>
      <section class="view" id="viewSummary"></section>
      <section class="view" id="viewLite"></section>
      <section class="view" id="viewFull"></section>
      <section class="view" id="viewThreads"></section>
    </main>

    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn" data-screen="start" type="button">Start</button>
      <button class="nav-btn" data-screen="summary" type="button">Summary</button>
      <button class="nav-btn" data-screen="lite" type="button">Lite</button>
      <button class="nav-btn" data-screen="full" type="button">Full</button>
      <button class="nav-btn" data-screen="threads" type="button">Threads</button>
    </nav>

    <div class="fly" id="fly" aria-hidden="true">
      <div class="fly__sheet" role="dialog" aria-modal="true" aria-labelledby="flyTitle">
        <div class="fly__hd">
          <div class="fly__title" id="flyTitle">Details</div>
          <button class="fly__close" id="flyClose" type="button">Close</button>
        </div>
        <div class="fly__body" id="flyBody"></div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
