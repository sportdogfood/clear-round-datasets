<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CRT Schedule — 1 Page Letter PDF</title>
<style>
  :root{
    --fg:#111;
    --muted:#666;
    --border:#d0d0d0;
    --ring:#0b5d47;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--fg);
    background:#fff;
  }

  .page{
    padding:12px;
    max-width:980px;
    margin:0 auto;
  }

  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    padding:0 0 10px 0;
    border-bottom:1px solid var(--border);
    margin-bottom:10px;
  }
  .title{font-weight:900; font-size:16px; line-height:1.05;}
  .subtitle{color:var(--muted); font-size:12px; margin-top:2px;}
  .btn{
    border:1px solid var(--border);
    background:#fff;
    padding:8px 12px;
    font-size:14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
  }

  /* preview only (readable on phone) */
  .cols{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    align-items:start;
  }
  @media (max-width: 760px){
    .cols{ grid-template-columns: 1fr; }
  }

  .col{display:flex; flex-direction:column; gap:8px; min-width:0;}
  .ring{ border:1px solid #111; }
  .ring-head{
    background:var(--ring);
    color:#fff;
    padding:6px 8px;
    font-weight:900;
    font-size:12px;
    letter-spacing:.02em;
  }

  .group-head{
    padding:6px 8px 4px 8px;
    border-top:1px solid #e7e7e7;
  }
  .gdisplay{
    font-size:12px;
    font-weight:800;
    text-transform:uppercase;
    text-align:right;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .class-list{padding:6px 8px 8px 8px;}
  .c{
    display:grid;
    grid-template-columns:64px 1fr;
    column-gap:10px;
    line-height:1.15;
    padding:3px 0;
  }
  .t{font-weight:800; font-size:12px; white-space:nowrap;}
  .n{font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .muted{color:var(--muted);}
  .err{white-space:pre-wrap; color:#b00020; padding:12px; font-size:12px; border:1px solid #b00020;}
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="title" id="title">Schedule</div>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <button class="btn" id="btnPdf">PDF (1 page)</button>
    </div>

    <div class="cols">
      <div class="col" id="colL"></div>
      <div class="col" id="colR"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
  // data source:
  // ?data=somefile.json  OR  #200000044-20251231 => loads 200000044-20251231.json
  // default: docs/schedule/data/print/schedule.json
  var qs = new URLSearchParams(location.search);
  var hashKey = (location.hash || "").replace(/^#/, "").trim();
  function resolveDataUrl(){
    var q = qs.get("data");
    if(q) return q;
    if(/^\d+\-\d{8}$/.test(hashKey)) return (hashKey + ".json");
    return "docs/schedule/data/print/schedule.json";
  }

  function esc(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c];
    });
  }
  function toInt(v){
    var n = Number(v);
    return Number.isFinite(n) ? n : null;
  }
  function firstNonEmpty(){
    for(var i=0;i<arguments.length;i++){
      var v = arguments[i];
      if(v !== undefined && v !== null && String(v).trim() !== "") return v;
    }
    return "";
  }
  function groupBy(arr, keyFn){
    var m = new Map();
    for(var i=0;i<arr.length;i++){
      var it = arr[i];
      var k = keyFn(it);
      if(!m.has(k)) m.set(k, []);
      m.get(k).push(it);
    }
    return m;
  }
  function normRollup(s){
    var raw = String(s == null ? "" : s).trim();
    if(!raw) return "";
    var parts = raw.split(",").map(function(x){ return x.trim(); }).filter(Boolean);
    var out = [];
    var seen = new Set();
    for(var i=0;i<parts.length;i++){
      var p = parts[i];
      var k = p.toLowerCase();
      if(seen.has(k)) continue;
      seen.add(k);
      out.push(p);
    }
    return out.join(", ");
  }
  async function fetchJson(url){
    var res = await fetch(url, {cache:"no-store"});
    var txt = await res.text();
    if(!res.ok) throw new Error("Fetch failed " + res.status + " for " + url + ": " + txt.slice(0,200));
    try { return JSON.parse(txt); }
    catch(e){ throw new Error("Bad JSON in " + url + ": " + txt.slice(0,200)); }
  }

  function parseRingSortKey(row){
    // Prefer ring_number; fallback to digits in ring_name/nickname
    var rn = row.ring_number;
    if(rn == null) rn = row.ringNumber;
    var n = toInt(rn);
    if(n != null) return n;

    var name = firstNonEmpty(row.ring_name, row.ringName, row.ring_nickname, row.ringNickname);
    var m = String(name || "").match(/(\d+)/);
    if(m) return toInt(m[1]) || 9999;
    return 9999;
  }

  function buildModel(rows){
    if(!rows || !rows.length) return null;

    var first = rows[0] || {};
    var showId = firstNonEmpty(first.show_id, first.showId);
    var reportTitle = firstNonEmpty(first.show_days_report_title, first.show_report_title, (showId ? ("Show " + showId) : "Schedule"));
    var displayDate = firstNonEmpty(first.show_days_display_date, first.show_display_date, first.show_date, first.showDate);
    var showDayKey = firstNonEmpty(first.show_day_key, first.showDayKey, first.show_days, first.showDays);

    var subtitleParts = [];
    if(displayDate) subtitleParts.push(String(displayDate));
    if(showId) subtitleParts.push("show_id " + showId);
    if(showDayKey) subtitleParts.push(String(showDayKey));

    // ring buckets (sorted)
    var ringMap = groupBy(rows, function(r){
      var rn = firstNonEmpty(r.ring_number, r.ringNumber, "9999");
      return String(rn);
    });

    var rings = Array.from(ringMap.entries()).map(function(entry){
      var k = entry[0];
      var items = entry[1];
      // sort key uses actual row content
      var sortKey = parseRingSortKey(items[0] || {});
      return { key:k, sortKey: sortKey, items: items };
    }).sort(function(a,b){
      return a.sortKey - b.sortKey;
    });

    var ringModels = rings.map(function(ring){
      var i0 = ring.items[0] || {};
      var ringTitle = firstNonEmpty(i0.ring_name, i0.ringName, i0.ring_nickname, i0.ringNickname, ("Ring " + ring.sortKey));

      var groupMap = groupBy(ring.items, function(x){
        return String(firstNonEmpty(x.class_group_id, x.classGroupId, ""));
      });

      var groups = Array.from(groupMap.entries()).map(function(entry){
        var items = entry[1];
        var seq = toInt(firstNonEmpty(items[0] && (items[0].class_group_sequence), items[0] && (items[0].classGroupSequence), 9999)) || 9999;
        var gd = normRollup(items.map(function(x){ return x.group_display; }).filter(Boolean).join(", "));
        // classes sorted by class_number
        var classes = items.slice().sort(function(a,b){
          var an = toInt(firstNonEmpty(a.class_number, a.classNumber, 999999)) || 999999;
          var bn = toInt(firstNonEmpty(b.class_number, b.classNumber, 999999)) || 999999;
          return an - bn;
        });

        var lines = [];
        var lastTime = null;
        for(var j=0;j<classes.length;j++){
          var c = classes[j];
          var time = String(firstNonEmpty(c.start_display, c.startDisplay, "")).trim();
          var showTime = !!(time && time !== lastTime);
          if(time) lastTime = time;

          var num = firstNonEmpty(c.class_number, c.classNumber);
          var name = firstNonEmpty(c.class_name, c.className, c.name, "");
          var label = "";
          if(num !== "" && num != null && String(num).trim() !== "" && String(num) !== "0") label = (String(num) + " - " + String(name)).trim();
          else label = String(name).trim();

          lines.push({ time: showTime ? time : "", text: label });
        }

        return { seq: seq, gdisplay: gd, hasTeam: !!gd, classes: lines };
      }).sort(function(a,b){ return a.seq - b.seq; });

      return { ringTitle: ringTitle, ringSortKey: ring.sortKey, groups: groups };
    });

    return {
      title: String(reportTitle || "Schedule"),
      subtitle: subtitleParts.join("   •   "),
      rings: ringModels
    };
  }

  // ---------- PREVIEW (sorted; never split ring; best split index keeps order) ----------
  function renderPreview(model){
    document.getElementById("title").textContent = model.title;
    document.getElementById("subtitle").textContent = model.subtitle;

    var ringsHtml = model.rings.map(function(r){
      var groupHtml = r.groups.map(function(g){
        var cl = g.classes.map(function(c){
          return '<div class="c"><div class="t">' + esc(c.time) + '</div><div class="n">' + esc(c.text) + '</div></div>';
        }).join("");
        return (
          '<div class="group">' +
            '<div class="group-head">' +
              (g.hasTeam ? ('<div class="gdisplay">' + esc(String(g.gdisplay).toUpperCase()) + '</div>') : '') +
            '</div>' +
            '<div class="class-list">' + (cl || '<div class="muted">No classes scheduled.</div>') + '</div>' +
          '</div>'
        );
      }).join("");

      return (
        '<section class="ring" data-ringsort="' + esc(r.ringSortKey) + '">' +
          '<div class="ring-head">' + esc(r.ringTitle) + '</div>' +
          groupHtml +
        '</section>'
      );
    });

    // build DOM nodes in sorted order
    var tmp = document.createElement("div");
    tmp.innerHTML = ringsHtml.join("");
    var ringEls = Array.from(tmp.children);

    var L = document.getElementById("colL");
    var R = document.getElementById("colR");
    L.innerHTML = "";
    R.innerHTML = "";

    // on mobile (1 column), keep sorted in LEFT
    var isOneCol = window.matchMedia("(max-width: 760px)").matches;
    if(isOneCol){
      ringEls.forEach(function(el){ L.appendChild(el); });
      return;
    }

    // measure heights at real column width, choose best split index (keeps order)
    var meas = document.createElement("div");
    meas.style.position = "absolute";
    meas.style.left = "-9999px";
    meas.style.top = "-9999px";
    meas.style.width = (L.getBoundingClientRect().width || 400) + "px";
    document.body.appendChild(meas);

    var heights = ringEls.map(function(el){
      var c = el.cloneNode(true);
      meas.appendChild(c);
      return Math.ceil(c.getBoundingClientRect().height || 0);
    });
    meas.remove();

    var total = heights.reduce(function(a,b){ return a+b; }, 0);
    var target = total / 2;

    var bestIdx = ringEls.length;
    var bestDiff = Infinity;
    var sum = 0;
    for(var i=0;i<heights.length;i++){
      sum += heights[i];
      var diff = Math.abs(target - sum);
      if(diff < bestDiff){
        bestDiff = diff;
        bestIdx = i+1;
      }
    }

    for(var k=0;k<ringEls.length;k++){
      if(k < bestIdx) L.appendChild(ringEls[k]);
      else R.appendChild(ringEls[k]);
    }
  }

  // ---------- PDF (SINGLE PAGE LETTER; sorted; no ring split; best split index keeps order) ----------
  function printOnePageLetterPdf(model){
    var jspdfNS = window.jspdf;
    if(!jspdfNS || !jspdfNS.jsPDF) throw new Error("jsPDF not loaded");
    var jsPDF = jspdfNS.jsPDF;

    var doc = new jsPDF({ orientation:"portrait", unit:"pt", format:"letter", compress:true });
    var W = doc.internal.pageSize.getWidth();   // 612
    var H = doc.internal.pageSize.getHeight();  // 792

    // push margins close (max coverage). printers may still add hardware margins.
    var M = 10;        // ~0.14"
    var G = 10;        // gutter
    var headerH = 36;

    var bodyY = M + headerH;
    var bodyH = H - M - bodyY;
    var usableW = W - (M*2);
    var colW = (usableW - G) / 2;
    var xL = M;
    var xR = M + colW + G;

    function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }

    function ellipsize(text, maxW){
      var s = String(text == null ? "" : text);
      if(maxW <= 0) return "";
      if(doc.getTextWidth(s) <= maxW) return s;
      var ell = "…";
      var lo = 0, hi = s.length;
      while(lo < hi){
        var mid = Math.floor((lo + hi) / 2);
        var t = s.slice(0, mid) + ell;
        if(doc.getTextWidth(t) <= maxW) lo = mid + 1;
        else hi = mid;
      }
      var cut = Math.max(0, lo - 1);
      return s.slice(0, cut) + ell;
    }

    function ringCounts(r){
      var groupsWithTeam = 0;
      var classCount = 0;
      for(var gi=0; gi<r.groups.length; gi++){
        var g = r.groups[gi];
        if(g.hasTeam && g.gdisplay) groupsWithTeam++;
        classCount += g.classes.length;
      }
      return { groupsWithTeam: groupsWithTeam, classCount: classCount };
    }

    function estimateRingHeight(font, tight, ring){
      // tuned to avoid “scaled” look: consistent sizes, minimal padding
      var counts = ringCounts(ring);
      var lineH = font + (tight ? 1.0 : 1.5);
      var grpH  = font + (tight ? 1.0 : 1.5);
      var pad   = tight ? 3 : 4;

      var headFont = font + 1.0;
      var headH = headFont + (tight ? 7 : 8);

      var h = headH + pad + (counts.groupsWithTeam ? (counts.groupsWithTeam * grpH) : 0) + (counts.classCount * lineH) + pad + 2;
      return { h:h, lineH:lineH, grpH:grpH, pad:pad, headFont:headFont, headH:headH };
    }

    function splitIndexForFont(font, tight){
      var heights = model.rings.map(function(r){ return estimateRingHeight(font, tight, r).h; });
      // if any ring > column height, fail
      for(var i=0;i<heights.length;i++){
        if(heights[i] > bodyH) return null;
      }

      var total = heights.reduce(function(a,b){ return a+b; }, 0);
      var target = total / 2;

      // choose best split that keeps BOTH columns <= bodyH and minimizes height difference
      var best = null;
      var sum = 0;
      for(var k=0;k<heights.length;k++){
        sum += heights[k];
        var leftH = sum;
        var rightH = total - sum;
        if(leftH <= bodyH && rightH <= bodyH){
          var diff = Math.abs(target - leftH);
          if(!best || diff < best.diff){
            best = { idx: k+1, diff: diff, leftH:leftH, rightH:rightH };
          }
        }
      }
      // allow all-left only if it fits (rare)
      if(!best && total <= bodyH) best = { idx: heights.length, diff: Math.abs(target-total), leftH:total, rightH:0 };
      return best ? best.idx : null;
    }

    function choosePlan(){
      // largest font possible while fitting 1 page (2 columns), never splitting rings, keep order
      var fontMax = 10.5;
      var fontMin = 7.0;
      var step = 0.25;

      for(var pass=0; pass<2; pass++){
        var tight = (pass === 1);
        for(var f=fontMax; f>=fontMin; f-=step){
          doc.setFont("helvetica","normal");
          doc.setFontSize(f);
          var idx = splitIndexForFont(f, tight);
          if(idx != null) return { font:f, tight:tight, splitIdx:idx };
        }
      }

      // hard fallback (still 1 page)
      var f2 = 6.5;
      doc.setFont("helvetica","normal");
      doc.setFontSize(f2);
      var idx2 = splitIndexForFont(f2, true);
      if(idx2 != null) return { font:f2, tight:true, splitIdx:idx2 };

      throw new Error("Cannot fit to 1 Letter page with current data without splitting rings.");
    }

    // header
    doc.setTextColor(0);
    doc.setFont("helvetica","bold");
    doc.setFontSize(13);
    doc.text(ellipsize(model.title, usableW), M, M + 16);
    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    if(model.subtitle) doc.text(ellipsize(model.subtitle, usableW), M, M + 32);

    var plan = choosePlan();
    var splitIdx = plan.splitIdx;
    var ringsL = model.rings.slice(0, splitIdx);
    var ringsR = model.rings.slice(splitIdx);

    // widths inside column
    var timeW = clamp(colW * 0.20, 44, 78);
    var gap = 6;
    var padX = plan.tight ? 4 : 5;

    function drawRingColumn(rings, x0){
      var y = bodyY;
      for(var ri=0; ri<rings.length; ri++){
        var ring = rings[ri];
        doc.setFont("helvetica","normal");
        doc.setFontSize(plan.font);
        var est = estimateRingHeight(plan.font, plan.tight, ring);

        // ring border
        doc.setDrawColor(0);
        doc.setLineWidth(0.7);
        doc.rect(x0, y, colW, est.h);

        // ring header bar (black)
        doc.setFillColor(0);
        doc.rect(x0, y, colW, est.headH, "F");
        doc.setTextColor(255);
        doc.setFont("helvetica","bold");
        doc.setFontSize(est.headFont);
        doc.text(ellipsize(ring.ringTitle, colW - (padX*2)), x0 + padX, y + est.headH - 4);

        // content
        doc.setTextColor(0);
        doc.setFont("helvetica","normal");
        doc.setFontSize(plan.font);

        var yy = y + est.headH + est.pad + 1;

        for(var gi=0; gi<ring.groups.length; gi++){
          var g = ring.groups[gi];

          if(g.hasTeam && g.gdisplay){
            doc.setFont("helvetica","bold");
            doc.setFontSize(plan.font);
            doc.text(
              ellipsize(String(g.gdisplay).toUpperCase(), colW - (padX*2)),
              x0 + colW - padX,
              yy,
              { align:"right" }
            );
            doc.setFont("helvetica","normal");
            yy += est.grpH;
          }

          for(var ci=0; ci<g.classes.length; ci++){
            var c = g.classes[ci];
            var labelW = colW - (padX*2) - timeW - gap;

            var t = ellipsize(c.time, timeW);
            var n = ellipsize(c.text, labelW);

            doc.setFont("helvetica","bold");
            doc.text(t, x0 + padX, yy);
            doc.setFont("helvetica","normal");
            doc.text(n, x0 + padX + timeW + gap, yy);

            yy += est.lineH;
          }
        }

        y += est.h + (plan.tight ? 4 : 6);
        if(y > bodyY + bodyH + 1) break; // safety
      }
    }

    drawRingColumn(ringsL, xL);
    drawRingColumn(ringsR, xR);

    // OPEN AS PDF RELIABLY ON iOS (same-tab nav to blob URL)
    var blob = doc.output("blob");
    var url = URL.createObjectURL(blob);
    window.location.assign(url);
    setTimeout(function(){
      try{ URL.revokeObjectURL(url); }catch(e){}
    }, 60000);
  }

  // ---------- BOOT ----------
  var __rows = null;
  var __model = null;

  (async function main(){
    var url = resolveDataUrl();
    var rows = await fetchJson(url);

    if(!Array.isArray(rows) || rows.length === 0){
      document.getElementById("colL").innerHTML = '<div class="muted">No schedule rows.</div>';
      __rows = [];
      return;
    }

    // Build + render (sorted)
    __rows = rows.slice().sort(function(a,b){
      return parseRingSortKey(a) - parseRingSortKey(b);
    });

    __model = buildModel(__rows);
    renderPreview(__model);

    document.getElementById("btnPdf").addEventListener("click", function(e){
      e.preventDefault();
      if(!__model) return;
      printOnePageLetterPdf(__model);
    });

    window.addEventListener("resize", function(){
      if(__model) renderPreview(__model);
    });
  })().catch(function(err){
    document.getElementById("colL").innerHTML =
      '<div class="err">' + esc(String(err && err.stack ? err.stack : err)) + '</div>';
  });
</script>
</body>
</html>
