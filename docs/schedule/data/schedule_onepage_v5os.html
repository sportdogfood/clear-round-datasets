<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CRT Schedule — One Page PDF</title>
<style>
  :root{
    --fg:#111;
    --muted:#666;
    --border:#d0d0d0;
    --ring:#0b5d47;
    --ringPrint:#000;
    --scale: 1;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--fg);
    background:#fff;
  }

  /* Letter preview */
  .page{
    width: 8.5in;
    height: 11in;
    padding: 0.15in;        /* push close */
    margin: 10px auto;
    background:#fff;
    overflow:hidden;
  }
  @media print{
    body{background:#fff;}
    .page{ width:auto; height:auto; padding:0; margin:0; overflow:visible; }
  }

  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    padding:0 0 4px 0;
  }
  .title{font-weight:900; font-size:14px; line-height:1.05;}
  .subtitle{color:var(--muted); font-size:10px; margin-top:2px;}
  .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .btn{
    border:1px solid var(--border);
    background:#fff;
    padding:4px 10px;
    font-size:12px;
    border-radius:6px;
    cursor:pointer;
  }

  /* scaled preview wrapper */
  .wrap{
    transform: scale(var(--scale));
    transform-origin: top left;
    width: calc(100% / var(--scale));
  }

  .cols{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.10in;            /* push close */
    align-items:start;
  }
  .col{display:flex; flex-direction:column; gap:2px; min-width:0;}

  .ring{ border:1px solid #000; }
  .ring-head{
    background:var(--ring);
    color:#fff;
    padding:4px 6px;
    font-weight:900;
    font-size:10px;
    letter-spacing:.02em;
  }

  .group.has-team{ background: rgb(204 204 204 / 43%); }
  .group.has-team .group-head{ padding-top:4px; padding-bottom:1px; }
  @media print{
    .group.has-team{ -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  .gdisplay{
    font-size:11px;
    font-weight:600;
    text-align:right;
    text-transform: uppercase;
    margin-bottom:-6px;
    margin-right: 10px;
    margin-left: 10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .gname{ display:none; }

  .class-list{padding:3px 6px 4px 6px; border-bottom: 1px solid #8e8c8c;}
  .c{
    display:grid;
    grid-template-columns:46px 1fr;
    column-gap:6px;
    line-height:1.05;
    padding:2px 0;
  }
  .t{font-weight:600; font-size:9px; white-space:nowrap;}
  .n{ font-size:9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .muted{color:var(--muted);}
  .err{white-space:pre-wrap; color:#b00020; padding:12px; font-size:12px;}

  @media print{
    @page{ size: Letter; margin: 0.15in; } /* push close */
    .controls{display:none !important;}
    body{-webkit-print-color-adjust: exact; print-color-adjust: exact;}
    .ring-head{background:var(--ringPrint);}
  }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="title" id="title">Schedule</div>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <div class="controls">
        <!-- ONE BUTTON: generates a SINGLE-PAGE Letter PDF and opens it (iPhone + desktop) -->
        <button class="btn" id="btnPdf">PDF</button>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="cols" id="cols">
        <div class="col" id="colL"></div>
        <div class="col" id="colR"></div>
      </div>
    </div>
  </div>

<!-- jsPDF (UMD) -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
  // Data source:
  // - ?data=somefile.json OR #200000044-20251231 => loads 200000044-20251231.json
  // - else defaults to docs/schedule/data/print/schedule.json
  const qs = new URLSearchParams(location.search);
  const hashKey = (location.hash || "").replace(/^#/, "").trim();
  function resolveDataUrl(){
    const q = qs.get("data");
    if(q) return q;
    if(/^\d+\-\d{8}$/.test(hashKey)) return `${hashKey}.json`;
    return "docs/schedule/data/print/schedule.json";
  }

  const esc = (s)=>String(s??"").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const toInt = (v)=>{ const n = Number(v); return Number.isFinite(n) ? n : null; };

  function normRollup(s){
    const raw = String(s ?? "").trim();
    if(!raw) return "";
    const parts = raw.split(",").map(x=>x.trim()).filter(Boolean);
    const out = [];
    const seen = new Set();
    for(const p of parts){
      const k = p.toLowerCase();
      if(seen.has(k)) continue;
      seen.add(k);
      out.push(p);
    }
    return out.join(", ");
  }

  async function fetchJson(url){
    const res = await fetch(url, {cache:"no-store"});
    const txt = await res.text();
    if(!res.ok) throw new Error(`Fetch failed ${res.status} for ${url}: ${txt.slice(0,200)}`);
    try { return JSON.parse(txt); }
    catch(e){ throw new Error(`Bad JSON in ${url}: ${txt.slice(0,200)}`); }
  }

  function groupBy(arr, keyFn){
    const m = new Map();
    for(const it of arr){
      const k = keyFn(it);
      if(!m.has(k)) m.set(k, []);
      m.get(k).push(it);
    }
    return m;
  }

  // ---------- SCREEN PREVIEW BUILD (keeps ring containers intact; distributes evenly over 2 cols) ----------
  function buildRingElements(rows){
    const first = rows[0] || {};
    const showId = first.show_id ?? first.showId ?? "";
    const reportTitle = first.show_days_report_title ?? first.show_report_title ?? (showId ? `Show ${showId}` : "Schedule");
    const displayDate = first.show_days_display_date ?? first.show_display_date ?? first.show_date ?? first.showDate ?? "";
    const showDayKey = first.show_day_key ?? first.showDayKey ?? first.show_days ?? first.showDays ?? "";
    document.getElementById("title").textContent = reportTitle;
    const subParts = [];
    if(displayDate) subParts.push(String(displayDate));
    if(showId !== "" && showId !== null && showId !== undefined) subParts.push(`show_id ${showId}`);
    if(showDayKey) subParts.push(String(showDayKey));
    document.getElementById("subtitle").textContent = subParts.join("   •   ");

    const rings = Array.from(groupBy(rows, r => String(r.ring_number ?? r.ringNumber ?? "9999")).entries())
      .map(([k, items]) => ({ ring_number: toInt(k) ?? 9999, items }))
      .sort((a,b)=>a.ring_number - b.ring_number);

    const ringEls = [];
    for(const ring of rings){
      const items0 = ring.items[0] || {};
      const ringTitle = items0.ring_name ?? items0.ringName ?? items0.ring_nickname ?? items0.ringNickname ?? `Ring ${ring.ring_number}`;

      const groups = Array.from(groupBy(ring.items, r => String(r.class_group_id ?? r.classGroupId ?? "")).entries())
        .map(([gid, items]) => {
          const seq = toInt(items[0]?.class_group_sequence ?? items[0]?.classGroupSequence ?? 9999) ?? 9999;
          const gname = items[0]?.group_group_name ?? items[0]?.group_name ?? items[0]?.groupName ?? "Group";
          const gd = normRollup(items.map(x => x.group_display).filter(Boolean).join(", "));
          return { gid, seq, gname, gdisplay: gd, items };
        })
        .sort((a,b)=>a.seq - b.seq);

      const sec = document.createElement("section");
      sec.className = "ring";
      sec.innerHTML = `<div class="ring-head">${esc(ringTitle)}</div>`;

      for(const g of groups){
        const classes = g.items.slice().sort((a,b)=>{
          const an = toInt(a.class_number ?? a.classNumber ?? 999999) ?? 999999;
          const bn = toInt(b.class_number ?? b.classNumber ?? 999999) ?? 999999;
          return an - bn;
        });

        let cl = "";
        let lastTime = null;
        for(const c of classes){
          const time = String(c.start_display ?? c.startDisplay ?? "").trim();
          const showTime = (time && time !== lastTime);
          if(time) lastTime = time;

          const num = c.class_number ?? c.classNumber;
          const name = c.class_name ?? c.className ?? c.name ?? "";
          const label = (num !== undefined && num !== null && String(num).trim() !== "" && String(num) !== "0")
            ? `${num} - ${name}`.trim()
            : String(name).trim();

          cl += `<div class="c"><div class="t">${esc(showTime ? time : "")}</div><div class="n">${esc(label)}</div></div>`;
        }

        const gDiv = document.createElement("div");
        gDiv.className = `group${g.gdisplay ? " has-team" : ""}`;
        gDiv.innerHTML = `
          <div class="group-head">
            ${g.gdisplay ? `<div class="gdisplay">${esc(g.gdisplay)}</div>` : ``}
            <div class="gname">${esc(g.gname)}</div>
          </div>
          <div class="class-list">${cl || `<div class="muted">No classes scheduled.</div>`}</div>
        `;
        sec.appendChild(gDiv);
      }
      ringEls.push(sec);
    }
    return ringEls;
  }

  function placeRingsEven(ringEls){
    const L = document.getElementById("colL");
    const R = document.getElementById("colR");
    L.innerHTML = "";
    R.innerHTML = "";

    // Measure by temporary append (single column), then greedy-balance across 2 cols (never split a ring).
    const tmp = document.createElement("div");
    tmp.style.position = "absolute";
    tmp.style.left = "-9999px";
    tmp.style.top = "-9999px";
    tmp.style.width = L.getBoundingClientRect().width ? (L.getBoundingClientRect().width + "px") : "4in";
    document.body.appendChild(tmp);

    const measured = ringEls.map(el=>{
      const clone = el.cloneNode(true);
      tmp.appendChild(clone);
      const h = Math.ceil(clone.getBoundingClientRect().height || 0);
      return { el, h };
    });

    tmp.remove();

    let hL = 0, hR = 0;
    for(const it of measured){
      if(hL <= hR){ L.appendChild(it.el); hL += it.h; }
      else        { R.appendChild(it.el); hR += it.h; }
    }
  }

  // ---------- PDF (SINGLE PAGE LETTER) ----------
  function buildModel(rows){
    const first = rows[0] || {};
    const showId = first.show_id ?? first.showId ?? "";
    const title = first.show_days_report_title ?? first.show_report_title ?? (showId ? `Show ${showId}` : "Schedule");
    const displayDate = first.show_days_display_date ?? first.show_display_date ?? first.show_date ?? first.showDate ?? "";
    const showDayKey = first.show_day_key ?? first.showDayKey ?? first.show_days ?? first.showDays ?? "";
    const subtitleParts = [];
    if(displayDate) subtitleParts.push(String(displayDate));
    if(showId !== "" && showId !== null && showId !== undefined) subtitleParts.push(`show_id ${showId}`);
    if(showDayKey) subtitleParts.push(String(showDayKey));
    const subtitle = subtitleParts.join("   •   ");

    const ringsRaw = Array.from(groupBy(rows, r => String(r.ring_number ?? r.ringNumber ?? "9999")).entries())
      .map(([k, items]) => ({ ring_number: toInt(k) ?? 9999, items }))
      .sort((a,b)=>a.ring_number - b.ring_number);

    const rings = ringsRaw.map(ring=>{
      const items0 = ring.items[0] || {};
      const ringTitle = items0.ring_name ?? items0.ringName ?? items0.ring_nickname ?? items0.ringNickname ?? `Ring ${ring.ring_number}`;

      const groupsRaw = Array.from(groupBy(ring.items, r => String(r.class_group_id ?? r.classGroupId ?? "")).entries())
        .map(([gid, items]) => {
          const seq = toInt(items[0]?.class_group_sequence ?? items[0]?.classGroupSequence ?? 9999) ?? 9999;
          const gd = normRollup(items.map(x => x.group_display).filter(Boolean).join(", "));
          return { gid, seq, gdisplay: gd, items };
        })
        .sort((a,b)=>a.seq - b.seq);

      const groups = groupsRaw.map(g=>{
        const classesSorted = g.items.slice().sort((a,b)=>{
          const an = toInt(a.class_number ?? a.classNumber ?? 999999) ?? 999999;
          const bn = toInt(b.class_number ?? b.classNumber ?? 999999) ?? 999999;
          return an - bn;
        });

        const lines = [];
        let lastTime = null;
        for(const c of classesSorted){
          const time = String(c.start_display ?? c.startDisplay ?? "").trim();
          const showTime = (time && time !== lastTime);
          if(time) lastTime = time;

          const num = c.class_number ?? c.classNumber;
          const name = c.class_name ?? c.className ?? c.name ?? "";
          const label = (num !== undefined && num !== null && String(num).trim() !== "" && String(num) !== "0")
            ? `${num} - ${name}`.trim()
            : String(name).trim();

          lines.push({ time: (showTime ? time : ""), text: label });
        }

        return { hasTeam: !!g.gdisplay, gdisplay: g.gdisplay, classes: lines };
      });

      return { ring_number: ring.ring_number, ringTitle, groups };
    });

    return { title: String(title || "Schedule"), subtitle: String(subtitle || ""), rings };
  }

  function printOnePagePdf(rows){
    const jspdfNS = window.jspdf;
    if(!jspdfNS || !jspdfNS.jsPDF) throw new Error("jsPDF not loaded");
    const { jsPDF } = jspdfNS;

    const model = buildModel(rows);

    // Letter in points: 612 x 792
    const doc = new jsPDF({ orientation:"portrait", unit:"pt", format:"letter", compress:true });
    const W = doc.internal.pageSize.getWidth();
    const H = doc.internal.pageSize.getHeight();

    // push margins close (but avoid edge clipping)
    const M = 14;     // ~0.19"
    const G = 10;     // gutter between 2 columns
    const headerH = 34;
    const bodyY = M + headerH;
    const bodyH = H - M - bodyY;
    const usableW = W - M*2;
    const colW = (usableW - G) / 2;

    function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }

    function ellipsize(text, maxW){
      const s = String(text ?? "");
      if(maxW <= 0) return "";
      if(doc.getTextWidth(s) <= maxW) return s;
      const ell = "…";
      let lo = 0, hi = s.length;
      while(lo < hi){
        const mid = Math.floor((lo + hi) / 2);
        const t = s.slice(0, mid) + ell;
        if(doc.getTextWidth(t) <= maxW) lo = mid + 1;
        else hi = mid;
      }
      const cut = Math.max(0, lo - 1);
      return s.slice(0, cut) + ell;
    }

    function ringLineCounts(r){
      let classCount = 0;
      let groupCount = 0;
      for(const g of r.groups){
        if(g.hasTeam && g.gdisplay) groupCount += 1;
        classCount += g.classes.length;
      }
      return { groupCount, classCount };
    }

    function estimateRingHeight(font, tight, ring){
      const { groupCount, classCount } = ringLineCounts(ring);
      const lead = tight ? 1.2 : 2.0;
      const lineH = font + lead;                  // class lines
      const grpH  = (font + (tight ? 1.0 : 2.0)); // group line
      const pad   = tight ? 3 : 4;

      const headerFont = font + 1.5;
      const headH = headerFont + (tight ? 6 : 8);

      const h =
        headH +
        pad +
        (groupCount ? (groupCount * grpH + (tight ? 2 : 3)) : 0) +
        (classCount * lineH) +
        pad +
        2; // border allowance

      return { h, lineH, grpH, headH, pad, headerFont };
    }

    function assignRings(rings, font, tight){
      const colHeights = [0,0];
      const colRings = [[],[]];
      const ringGap = tight ? 4 : 6;

      for(const ring of rings){
        const est = estimateRingHeight(font, tight, ring);
        if(est.h > bodyH) return null;

        // greedy balance: place next ring in the currently shorter column
        const order = (colHeights[0] <= colHeights[1]) ? [0,1] : [1,0];
        let placed = false;

        for(const idx of order){
          if(colHeights[idx] + est.h <= bodyH){
            colRings[idx].push({ ring, est });
            colHeights[idx] += est.h + ringGap;
            placed = true;
            break;
          }
        }
        if(!placed) return null;
      }
      return { colRings };
    }

    // Choose largest font that fits 2 columns, never splitting rings, single page.
    function choosePlan(){
      const fontMax = 11.0;
      const fontMin = 5.0;
      const step = 0.5;

      // try normal then tight
      for(const tight of [false, true]){
        for(let f = fontMax; f >= fontMin; f -= step){
          const a = assignRings(model.rings, f, tight);
          if(a) return { font: f, tight, ...a };
        }
      }

      // hard fallback
      const tight = true;
      const font = 4.5;
      const a = assignRings(model.rings, font, tight);
      if(a) return { font, tight, ...a };
      return null;
    }

    const plan = choosePlan();
    if(!plan) throw new Error("Cannot fit to one page with current data (even at minimal sizing).");

    // Header (minimal)
    doc.setTextColor(0);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(13);
    doc.text(ellipsize(model.title, usableW), M, M + 16);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    if(model.subtitle) doc.text(ellipsize(model.subtitle, usableW), M, M + 30);

    // Column x origins
    const xCols = [M, M + colW + G];

    // Common widths
    const timeW = clamp(colW * 0.20, 44, 78);
    const gap = 5;

    // Draw rings
    const ringGap = plan.tight ? 4 : 6;

    for(let ci=0; ci<2; ci++){
      let y = bodyY;
      const x = xCols[ci];

      for(const item of plan.colRings[ci]){
        const { ring, est } = item;

        // outer ring box
        doc.setDrawColor(0);
        doc.setLineWidth(0.7);
        doc.rect(x, y, colW, est.h);

        // ring header bar (black)
        doc.setFillColor(0);
        doc.rect(x, y, colW, est.headH, "F");

        doc.setTextColor(255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(est.headerFont);
        const headText = ellipsize(ring.ringTitle, colW - (est.pad*2));
        doc.text(headText, x + est.pad, y + est.headH - (plan.tight ? 3.5 : 4.5));

        doc.setTextColor(0);
        doc.setFontSize(plan.font);
        doc.setFont("helvetica", "normal");

        let yy = y + est.headH + est.pad + (plan.tight ? 1 : 2);

        // groups + classes
        for(const g of ring.groups){
          if(g.hasTeam && g.gdisplay){
            // subtle gray band for group header
            doc.setFillColor(230);
            doc.rect(x + 1, yy - (est.grpH - 1), colW - 2, est.grpH + 2, "F");

            doc.setTextColor(0);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(plan.font + (plan.tight ? 0.0 : 0.5));
            const gd = ellipsize(g.gdisplay.toUpperCase(), colW - (est.pad*2));
            doc.text(gd, x + colW - est.pad, yy, { align:"right" });

            doc.setFont("helvetica", "normal");
            doc.setFontSize(plan.font);

            yy += est.grpH;
          }

          let first = true;
          for(const c of g.classes){
            const t = first ? (c.time || "") : (c.time || "");
            // time is already deduped upstream; keep blanks as-is
            const timeTxt = ellipsize(t, timeW);

            // label
            const labelW = colW - est.pad*2 - timeW - gap;
            const labelTxt = ellipsize(c.text, labelW);

            // draw
            doc.setFont("helvetica", "bold");
            doc.text(timeTxt, x + est.pad, yy);
            doc.setFont("helvetica", "normal");
            doc.text(labelTxt, x + est.pad + timeW + gap, yy);

            yy += est.lineH;
            first = false;
          }
        }

        y += est.h + ringGap;
      }
    }

    // Open the SINGLE-PAGE PDF (works on iOS + desktop)
    const blob = doc.output("blob");
    const url = URL.createObjectURL(blob);

    let opened = null;
    try { opened = window.open(url, "_blank", "noopener"); } catch(e){}
    if(!opened){
      // iOS fallback: same-tab navigation
      window.location.href = url;
    }

    // cleanup later
    setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch(e){} }, 60000);
  }

  // ---------- BOOT ----------
  let __rows = null;

  (async function main(){
    const url = resolveDataUrl();
    const rows = await fetchJson(url);

    if(!Array.isArray(rows) || rows.length === 0){
      document.getElementById("colL").innerHTML = `<div class="muted">No schedule rows.</div>`;
      __rows = [];
      return;
    }

    __rows = rows;

    // screen preview
    const ringEls = buildRingElements(rows);
    placeRingsEven(ringEls);

    // one button
    document.getElementById("btnPdf").addEventListener("click", (e)=>{
      e.preventDefault();
      if(!__rows || !__rows.length) return;
      printOnePagePdf(__rows);
    });
  })().catch(err=>{
    document.getElementById("colL").innerHTML = `<div class="err">${esc(String(err && err.stack ? err.stack : err))}</div>`;
  });
</script>
</body>
</html>
