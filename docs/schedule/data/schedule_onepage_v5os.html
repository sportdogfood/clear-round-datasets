<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CRT Schedule (One Page Print)</title>

<style>
  :root{
    --fg:#111;
    --muted:#666;
    --border:#d0d0d0;
    --ring:#0b5d47;
    --ringPrint:#000;
    --scale: 1;
  }
  *{box-sizing:border-box}
  html,body{margin:0; padding:0;}
  body{
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--fg);
    background:#fff;
  }

  /* Single Letter page preview */
  .page{
    width: 8.5in;
    height: 11in;
    padding: 0.15in;              /* tight “margin” inside the page */
    margin: 10px auto;
    background:#fff;
    overflow:hidden;
  }

  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    padding:0 0 6px 0;
  }
  .title{font-weight:900; font-size:14px; line-height:1.1;}
  .subtitle{color:var(--muted); font-size:10px; margin-top:2px;}
  .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .btn{
    border:1px solid var(--border);
    background:#fff;
    padding:3px 10px;
    font-size:12px;
    border-radius:6px;
    cursor:pointer;
  }

  /* scaled wrapper */
  .wrap{
    transform: scale(var(--scale));
    transform-origin: top left;
    width: calc(100% / var(--scale));
  }
  .wrap.use-zoom{
    transform:none;
    width:auto;
  }

  /* TWO columns */
  .cols{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.12in;
    align-items:start;
  }
  .col{display:flex; flex-direction:column; gap:2px; min-width:0;}

  .ring{
    border:1px solid #000;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .ring-head{
    background:var(--ring);
    color:#fff;
    padding:4px 6px;
    font-weight:900;
    font-size:10px;
    letter-spacing:.02em;
  }

  /* highlight groups that have a team (gdisplay present) */
  .group.has-team{
    background: rgb(204 204 204 / 43%);
  }
  .group.has-team .group-head{
    padding-bottom: 1px;
    padding-top: 4px;
  }

  /* group_display above group_name */
  .gdisplay{
    font-size:11px;
    font-weight:600;
    text-align:right;
    text-transform: uppercase;
    margin-bottom:-6px;
    margin-right: 20px;
    margin-left: 10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .gname{
    font-weight:900;
    font-size:10px;
    line-height:1.1;
    text-align:left;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    display:none; /* per spec */
  }

  .solid{border-top:0px solid #111; margin:0;}
  .class-list{padding:3px 6px 4px 6px; border-bottom: 1px solid #8e8c8c}

  .c{
    display:grid;
    grid-template-columns:46px 1fr;
    column-gap:6px;
    line-height:1.05;
    padding:2px 0;
  }
  .t{font-weight:600; font-size:9px; white-space:nowrap;}
  .n{
    font-size:9px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .muted{color:var(--muted);}
  .err{white-space:pre-wrap; color:#b00020; padding:12px; font-size:12px;}

  /* Print: maximize coverage + force 1 page layout */
  @media print{
    @page{ size: Letter; margin: 0.15in; } /* as tight as most print engines allow */
    html,body{background:#fff;}
    body{ -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    .controls{display:none !important;}
    .page{
      width:auto;
      height:auto;
      padding:0;                  /* margins handled by @page */
      margin:0;
      overflow:visible;
    }

    .ring-head{background:var(--ringPrint);}

    /* in print, try zoom first (Chromium), else transform */
    .wrap.use-zoom{
      zoom: var(--scale);
    }
    .wrap:not(.use-zoom){
      transform: scale(var(--scale));
      transform-origin: top left;
      width: calc(100% / var(--scale));
    }

    /* keep “team highlight” printing */
    .group.has-team{
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ultra-tight fallback */
    body.tight .ring-head{padding:3px 5px; font-size:9px;}
    body.tight .group-head{padding:2px 5px;}
    body.tight .gdisplay{font-size:9px; margin-bottom:1px;}
    body.tight .class-list{padding:2px 5px 3px 5px;}
    body.tight .c{grid-template-columns:42px 1fr; column-gap:5px; padding:1px 0;}
    body.tight .t{font-size:8px;}
    body.tight .n{font-size:8px;}
  }
</style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="title" id="title">Schedule</div>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <div class="controls">
        <button class="btn" onclick="window.print()">Print / Save PDF</button>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="cols" id="cols">
        <div class="col" id="colL"></div>
        <div class="col" id="colR"></div>
      </div>
    </div>
  </div>

<script>
  // Usage:
  // schedule_onepage.html#200000044-20251231  -> fetches 200000044-20251231.json (same folder)
  // Optional: ?data=somefile.json overrides hash.
  const qs = new URLSearchParams(location.search);
  const hashKey = (location.hash || "").replace(/^#/, "").trim();

  function resolveDataUrl(){
    const q = qs.get("data");
    if(q) return q;
    if(/^\d+\-\d{8}$/.test(hashKey)) return `${hashKey}.json`;
    return "docs/schedule/data/print/schedule.json";
  }

  const esc = (s)=>String(s??"").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const toInt = (v)=>{ const n = Number(v); return Number.isFinite(n) ? n : null; };

  function normRollup(s){
    const raw = String(s ?? "").trim();
    if(!raw) return "";
    const parts = raw.split(",").map(x=>x.trim()).filter(Boolean);
    const out = [];
    const seen = new Set();
    for(const p of parts){
      const k = p.toLowerCase();
      if(seen.has(k)) continue;
      seen.add(k);
      out.push(p);
    }
    return out.join(", ");
  }

  async function fetchJson(url){
    const res = await fetch(url, {cache:"no-store"});
    const txt = await res.text();
    if(!res.ok) throw new Error(`Fetch failed ${res.status} for ${url}: ${txt.slice(0,200)}`);
    try { return JSON.parse(txt); }
    catch(e){ throw new Error(`Bad JSON in ${url}: ${txt.slice(0,200)}`); }
  }

  function groupBy(arr, keyFn){
    const m = new Map();
    for(const it of arr){
      const k = keyFn(it);
      if(!m.has(k)) m.set(k, []);
      m.get(k).push(it);
    }
    return m;
  }

  function pxPerInch(){
    const d = document.createElement("div");
    d.style.width = "1in";
    d.style.position = "absolute";
    d.style.left = "-9999px";
    d.style.top = "-9999px";
    document.body.appendChild(d);
    const ppi = d.offsetWidth || 96;
    d.remove();
    return ppi;
  }

  function buildRingElements(rows){
    const first = rows[0] || {};
    const showId = first.show_id ?? first.showId ?? "";

    // REQUIRED: header must come from show_days_* fields.
    const reportTitle =
      first.show_days_report_title ??
      first.show_report_title ??
      (showId ? `Show ${showId}` : "Schedule");

    const displayDate =
      first.show_days_display_date ??
      first.show_display_date ??
      first.show_date ??
      first.showDate ??
      "";

    const showDayKey =
      first.show_day_key ??
      first.showDayKey ??
      first.show_days ??
      first.showDays ??
      "";

    document.getElementById("title").textContent = reportTitle;
    const subParts = [];
    if(displayDate) subParts.push(String(displayDate));
    if(showId !== "" && showId !== null && showId !== undefined) subParts.push(`show_id ${showId}`);
    if(showDayKey) subParts.push(String(showDayKey));
    document.getElementById("subtitle").textContent = subParts.join("   •   ");

    // RINGS sorted by ring_number
    const rings = Array.from(groupBy(rows, r => String(r.ring_number ?? r.ringNumber ?? "9999")).entries())
      .map(([k, items]) => ({ ring_number: toInt(k) ?? 9999, items }))
      .sort((a,b)=>a.ring_number - b.ring_number);

    const ringEls = [];

    for(const ring of rings){
      const items0 = ring.items[0] || {};
      const ringTitle =
        items0.ring_name ??
        items0.ringName ??
        items0.ring_nickname ??
        items0.ringNickname ??
        `Ring ${ring.ring_number}`;

      // Groups within a ring sorted by class_group_sequence
      const groups = Array.from(groupBy(ring.items, r => String(r.class_group_id ?? r.classGroupId ?? "")).entries())
        .map(([gid, items]) => {
          const seq = toInt(items[0]?.class_group_sequence ?? items[0]?.classGroupSequence ?? 9999) ?? 9999;
          const gname = items[0]?.group_group_name ?? items[0]?.group_name ?? items[0]?.groupName ?? "Group";
          const gd = normRollup(items.map(x => x.group_display).filter(Boolean).join(", "));
          return { gid, seq, gname, gdisplay: gd, items };
        })
        .sort((a,b)=>a.seq - b.seq);

      const sec = document.createElement("section");
      sec.className = "ring";
      sec.innerHTML = `<div class="ring-head">${esc(ringTitle)}</div>`;

      for(const g of groups){
        const classes = g.items.slice().sort((a,b)=>{
          const an = toInt(a.class_number ?? a.classNumber ?? 999999) ?? 999999;
          const bn = toInt(b.class_number ?? b.classNumber ?? 999999) ?? 999999;
          return an - bn;
        });

        let cl = "";
        let lastTime = null;
        for(const c of classes){
          const time = String(c.start_display ?? c.startDisplay ?? "").trim();
          const showTime = (time && time !== lastTime);
          if(time) lastTime = time;

          const num = c.class_number ?? c.classNumber;
          const name = c.class_name ?? c.className ?? c.name ?? "";
          const label =
            (num !== undefined && num !== null && String(num).trim() !== "" && String(num) !== "0")
              ? `${num} - ${name}`.trim()
              : String(name).trim();

          cl += `<div class="c"><div class="t">${esc(showTime ? time : "")}</div><div class="n">${esc(label)}</div></div>`;
        }

        const gDiv = document.createElement("div");
        gDiv.className = `group${g.gdisplay ? " has-team" : ""}`;
        gDiv.innerHTML = `
          <div class="group-head">
            ${g.gdisplay ? `<div class="gdisplay">${esc(g.gdisplay)}</div>` : ``}
            <div class="gname">${esc(g.gname)}</div>
          </div>
          <div class="solid"></div>
          <div class="class-list">${cl || `<div class="muted">No classes scheduled.</div>`}</div>
        `;
        sec.appendChild(gDiv);
      }

      ringEls.push(sec);
    }

    return ringEls;
  }

  // PLACE rings: fill LEFT top->bottom with WHOLE rings, then RIGHT top->bottom.
  // Never split a ring across columns.
  function placeRingsFillDown(ringEls){
    const L = document.getElementById("colL");
    const R = document.getElementById("colR");
    L.innerHTML = "";
    R.innerHTML = "";

    // 1) Append to LEFT to measure each ring height at scale=1.
    for(const el of ringEls) L.appendChild(el);

    // Compute available height inside the page for the columns.
    const ppi = pxPerInch();
    const pageInnerH = (11 - (0.15*2)) * ppi; // inside @page margin equivalent for preview
    const topbar = document.querySelector(".topbar");
    const availH = Math.max(0, pageInnerH - (topbar?.offsetHeight || 0) - 6);

    const heights = ringEls.map(el => Math.ceil(el.getBoundingClientRect().height || 0));

    // 2) Move rings to RIGHT once the next ring would overflow LEFT.
    let used = 0;
    let toRightFrom = ringEls.length; // index where we start moving to right
    for(let i=0;i<ringEls.length;i++){
      const h = heights[i] || 0;
      if(i === 0){
        used = h;
        continue;
      }
      if(used + h <= availH){
        used += h;
      }else{
        toRightFrom = i;
        break;
      }
    }

    // Move overflow rings to RIGHT (keeps order: down left, then down right)
    for(let i=toRightFrom;i<ringEls.length;i++){
      R.appendChild(ringEls[i]);
    }
  }

  // Scale-to-one-page (tight margins)
  function fitToOnePage(){
    const wrap = document.getElementById("wrap");
    const topbar = document.querySelector(".topbar");
    const cols = document.getElementById("cols");
    const colL = document.getElementById("colL");
    const colR = document.getElementById("colR");
    if(!wrap || !topbar || !cols || !colL || !colR) return;

    // reset
    wrap.style.setProperty("--scale", "1");
    wrap.classList.remove("use-zoom");
    wrap.style.zoom = "";
    document.body.classList.remove("tight");

    const ppi = pxPerInch();

    // Match @page margin 0.15in -> printable area = (8.5-0.3) x (11-0.3)
    const availW = (8.5 - 0.30) * ppi;
    const availH = (11  - 0.30) * ppi - topbar.offsetHeight - 6;

    const needH = Math.max(colL.scrollHeight, colR.scrollHeight);
    const needW = cols.scrollWidth || cols.getBoundingClientRect().width || wrap.getBoundingClientRect().width;

    let scaleH = (needH > 0 && availH > 0) ? (availH / needH) : 1;
    let scaleW = (needW > 0 && availW > 0) ? (availW / needW) : 1;

    let scale = Math.min(1, scaleH, scaleW);
    scale = Math.max(0.30, Math.min(1, scale));

    if(scale < 0.60) document.body.classList.add("tight");

    const canZoom = ("zoom" in wrap.style);
    if(canZoom){
      wrap.classList.add("use-zoom");
      wrap.style.zoom = String(scale);
    }
    wrap.style.setProperty("--scale", String(scale));

    // second pass after tight mode
    if(document.body.classList.contains("tight")){
      const needH2 = Math.max(colL.scrollHeight, colR.scrollHeight);
      let scale2 = Math.min(1, (availH / (needH2 || 1)));
      scale2 = Math.max(0.30, Math.min(1, scale2));
      if(canZoom) wrap.style.zoom = String(scale2);
      wrap.style.setProperty("--scale", String(scale2));
    }
  }

  (async function main(){
    const url = resolveDataUrl();
    const rows = await fetchJson(url);

    if(!Array.isArray(rows) || rows.length === 0){
      document.getElementById("colL").innerHTML = `<div class="muted">No schedule rows.</div>`;
      return;
    }

    const ringEls = buildRingElements(rows);

    // layout pass: no ring splitting; fill down left then down right
    placeRingsFillDown(ringEls);

    // fit pass (do it twice to stabilize measurements)
    fitToOnePage();
    requestAnimationFrame(() => {
      fitToOnePage();
      // if scaling changed heights a lot, keep the “fill left then right” intent
      // (don’t rebalance; only re-place using the same rule)
      placeRingsFillDown(ringEls);
      requestAnimationFrame(fitToOnePage);
    });

    window.addEventListener("beforeprint", () => {
      // keep rings intact + re-fit right before print
      placeRingsFillDown(ringEls);
      fitToOnePage();
    });
    window.addEventListener("resize", () => {
      placeRingsFillDown(ringEls);
      fitToOnePage();
    });
  })().catch(err=>{
    document.getElementById("colL").innerHTML = `<div class="err">${esc(String(err && err.stack ? err.stack : err))}</div>`;
  });
</script>
</body>
</html>
