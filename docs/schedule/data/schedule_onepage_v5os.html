<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CRT Schedule (One Page PDF)</title>

<style>
  :root{
    --fg:#111;
    --muted:#666;
    --border:#d0d0d0;

    /* maximize printable area */
    --page-pad: 0.10in;      /* inside the letter page */
    --col-gap: 0.08in;       /* gap between the 2 columns */

    /* sizing (base) */
    --ring-head-pad-y: 4px;
    --ring-head-pad-x: 6px;
    --ring-head-font: 10px;

    --gdisplay-font: 11px;
    --time-font: 9px;
    --name-font: 9px;
    --row-pad-y: 2px;
    --row-gap: 6px;
    --time-col: 46px;

    /* colors */
    --ring:#0b5d47;
    --ringPrint:#000;
    --teamHi: rgba(204,204,204,.43);

    /* scale (only used if content still cannot fit) */
    --scale: 1;
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--fg);
    background:#fff;
  }

  /* Letter preview */
  .page{
    width: 8.5in;
    height: 11in;
    padding: var(--page-pad);
    margin: 10px auto;
    background:#fff;
    overflow:hidden;
  }

  /* keep a consistent preview on screen */
  @media (max-width: 920px){
    .page{ margin: 0 auto; }
  }

  /* Header aligns to the same 2-column grid as the body */
  .topbar{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--col-gap);
    align-items:end;
    padding:0 0 4px 0;
  }
  .tb-left{ display:flex; align-items:flex-end; justify-content:space-between; gap:10px; min-width:0; }
  .tb-right{ display:flex; align-items:flex-end; justify-content:flex-start; min-width:0; }
  .title{ font-weight:900; font-size:13px; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .subtitle{ color:var(--muted); font-size:10px; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .controls{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .btn{
    border:1px solid var(--border);
    background:#fff;
    padding:4px 10px;
    font-size:12px;
    border-radius:6px;
    cursor:pointer;
  }
  .btn[disabled]{ opacity:.6; cursor:default; }

  /* Scaled content wrapper (only scales DOWN if absolutely necessary) */
  .wrap{
    transform: scale(var(--scale));
    transform-origin: top left;
    width: calc(100% / var(--scale));
  }

  /* 2 explicit columns */
  .cols{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--col-gap);
    align-items:start;
  }
  .col{ display:flex; flex-direction:column; gap:2px; min-width:0; }

  /* Ring container (never split; it moves as a whole to either column) */
  .ring{ border:1px solid #000; }
  .ring-head{
    background:var(--ring);
    color:#fff;
    padding: var(--ring-head-pad-y) var(--ring-head-pad-x);
    font-weight:900;
    font-size:var(--ring-head-font);
    letter-spacing:.02em;
  }

  /* group highlight when group_display is present */
  .group.has-team{ background: var(--teamHi); }
  .group-head{ padding: 2px 6px 1px 6px; }

  .gdisplay{
    font-size:var(--gdisplay-font);
    font-weight:600;
    text-align:right;
    text-transform: uppercase;
    margin: 0 6px 0 6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .gname{ display:none; }

  .class-list{
    padding: 3px 6px 4px 6px;
    border-bottom: 1px solid #8e8c8c;
  }

  .c{
    display:grid;
    grid-template-columns: var(--time-col) 1fr;
    column-gap: var(--row-gap);
    line-height:1.05;
    padding: var(--row-pad-y) 0;
  }
  .t{ font-weight:600; font-size:var(--time-font); white-space:nowrap; }
  .n{
    font-size:var(--name-font);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .muted{ color:var(--muted); }
  .err{ white-space:pre-wrap; color:#b00020; padding:12px; font-size:12px; }

  /* Tight mode (reduces padding/fonts BEFORE scaling) */
  body.tight{
    --page-pad: 0.08in;
    --col-gap: 0.06in;

    --ring-head-pad-y: 3px;
    --ring-head-pad-x: 5px;
    --ring-head-font: 9px;

    --gdisplay-font: 9px;
    --time-font: 8px;
    --name-font: 8px;
    --row-pad-y: 1px;
    --row-gap: 5px;
    --time-col: 42px;
  }

  /* Print (mostly irrelevant because we generate a PDF, but keep sane defaults) */
  @media print{
    @page{ size: Letter; margin: 0in; }
    .controls{ display:none !important; }
    body{-webkit-print-color-adjust: exact; print-color-adjust: exact;}
    .page{ margin:0; padding:0; width:auto; height:auto; overflow:visible; }
    .ring-head{ background:var(--ringPrint); }
  }
</style>
</head>

<body>
  <div class="page" id="page">
    <div class="topbar">
      <div class="tb-left">
        <div class="title" id="title">Schedule</div>
        <div class="controls">
          <button class="btn" id="btnPdf" type="button">PDF</button>
          <a class="btn" id="btnHome" href="https://ringstatus.com" target="_blank" rel="noopener">Home</a>
        </div>
      </div>
      <div class="tb-right">
        <div class="subtitle" id="subtitle"></div>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="cols" id="cols">
        <div class="col" id="colL"></div>
        <div class="col" id="colR"></div>
      </div>
    </div>
  </div>

<!-- libs (PDF is generated in-browser, consistent for iPhone + desktop) -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
  // Usage:
  // schedule_onepage_v6.html#200000044-20251231  -> fetches 200000044-20251231.json (same folder)
  // Optional: ?data=somefile.json overrides hash.
  const qs = new URLSearchParams(location.search);
  const hashKey = (location.hash || "").replace(/^#/, "").trim();

  function resolveDataUrl(){
    const q = qs.get("data");
    if(q) return q;
    if(/^\d+\-\d{8}$/.test(hashKey)) return `${hashKey}.json`;
    return "docs/schedule/data/print/schedule.json";
  }

  const esc = (s)=>String(s??"").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const toInt = (v)=>{ const n = Number(v); return Number.isFinite(n) ? n : null; };

  function normRollup(s){
    const raw = String(s ?? "").trim();
    if(!raw) return "";
    const parts = raw.split(",").map(x=>x.trim()).filter(Boolean);
    const out = [];
    const seen = new Set();
    for(const p of parts){
      const k = p.toLowerCase();
      if(seen.has(k)) continue;
      seen.add(k);
      out.push(p);
    }
    return out.join(", ");
  }

  async function fetchJson(url){
    const res = await fetch(url, {cache:"no-store"});
    const txt = await res.text();
    if(!res.ok) throw new Error(`Fetch failed ${res.status} for ${url}: ${txt.slice(0,200)}`);
    try { return JSON.parse(txt); }
    catch(e){ throw new Error(`Bad JSON in ${url}: ${txt.slice(0,200)}`); }
  }

  function groupBy(arr, keyFn){
    const m = new Map();
    for(const it of arr){
      const k = keyFn(it);
      if(!m.has(k)) m.set(k, []);
      m.get(k).push(it);
    }
    return m;
  }

  function placeRingsBalanced(ringEls){
    const L = document.getElementById("colL");
    const R = document.getElementById("colR");
    L.innerHTML = "";
    R.innerHTML = "";

    // Append all to LEFT so we can measure.
    for(const el of ringEls) L.appendChild(el);

    // Measure ring heights
    const heights = ringEls.map(el=> Math.ceil(el.getBoundingClientRect().height || 0));
    const total = heights.reduce((a,b)=>a+b,0);

    // Find split index that MINIMIZES the max column height (keeps ring order)
    let bestSplit = ringEls.length;
    let bestMax = Infinity;
    let prefix = 0;

    for(let i=0;i<=heights.length;i++){
      const leftH = prefix;
      const rightH = total - prefix;
      const m = Math.max(leftH, rightH);
      if(m < bestMax){
        bestMax = m;
        bestSplit = i;
      }
      if(i < heights.length) prefix += heights[i];
    }

    // Move the remainder (keeps overall order: left column then right column).
    for(let i=bestSplit;i<ringEls.length;i++){
      R.appendChild(ringEls[i]);
    }
  }

  function fitToOnePage(){
    const page = document.getElementById("page");
    const wrap = document.getElementById("wrap");
    const topbar = document.querySelector(".topbar");
    const colL = document.getElementById("colL");
    const colR = document.getElementById("colR");
    if(!page || !wrap || !topbar || !colL || !colR) return;

    // Reset first
    document.body.classList.remove("tight");
    wrap.style.setProperty("--scale", "1");

    // Available area inside page (in px)
    // IMPORTANT: subtract page padding, otherwise we over-estimate and clip rows at the bottom.
    const pageRect = page.getBoundingClientRect();
    const topRect = topbar.getBoundingClientRect();

    const cs = getComputedStyle(page);
    const padT = parseFloat(cs.paddingTop) || 0;
    const padB = parseFloat(cs.paddingBottom) || 0;
    const padL = parseFloat(cs.paddingLeft) || 0;
    const padR = parseFloat(cs.paddingRight) || 0;
    const innerH = pageRect.height - padT - padB;
    const innerW = pageRect.width - padL - padR;

    // Small safety buffer avoids fractional rounding clip in canvas -> PDF.
    const safety = Math.ceil(pxPerInch() * 0.06);

    const availH = innerH - (topRect.height + safety);
    const availW = innerW - safety;

    // Needed size (in px) at scale 1
    const needH0 = Math.max(colL.scrollHeight, colR.scrollHeight);
    const needW0 = wrap.scrollWidth || wrap.getBoundingClientRect().width;

    // If it fits, keep base sizing
    if(needH0 <= availH && needW0 <= availW){
      return;
    }

    // Tight mode first (bigger fonts than scaling-down-everything)
    document.body.classList.add("tight");

    const needH1 = Math.max(colL.scrollHeight, colR.scrollHeight);
    const needW1 = wrap.scrollWidth || wrap.getBoundingClientRect().width;
    if(needH1 <= availH && needW1 <= availW){
      return;
    }

    // Scale only as a last resort to guarantee 1 page
    let sH = availH / (needH1 || 1);
    let sW = availW / (needW1 || 1);
    let s = Math.min(1, sH, sW);

    // hard clamp so it never becomes unreadable, but still guarantees 1 page
    s = Math.max(0.55, Math.min(1, s));
    wrap.style.setProperty("--scale", String(s));
  }

  function buildRingElements(rows){
    const first = rows[0] || {};
    const showId = first.show_id ?? first.showId ?? "";

    // Header from show_days_* fields
    const reportTitle = first.show_days_report_title ?? first.show_report_title ?? (showId ? `Show ${showId}` : "Schedule");
    const displayDate = first.show_days_display_date ?? first.show_display_date ?? first.show_date ?? first.showDate ?? "";
    const showDayKey = first.show_day_key ?? first.showDayKey ?? first.show_days ?? first.showDays ?? "";

    document.getElementById("title").textContent = reportTitle;
    const subParts = [];
    if(displayDate) subParts.push(String(displayDate));
    if(showId !== "" && showId !== null && showId !== undefined) subParts.push(`show_id ${showId}`);
    if(showDayKey) subParts.push(String(showDayKey));
    document.getElementById("subtitle").textContent = subParts.join("   •   ");

    // Rings: sort by ring_number (numeric)
    const rings = Array.from(groupBy(rows, r => String(r.ring_number ?? r.ringNumber ?? "9999")).entries())
      .map(([k, items]) => ({ ring_number: toInt(k) ?? 9999, items }))
      .sort((a,b)=>a.ring_number - b.ring_number);

    const ringEls = [];

    for(const ring of rings){
      const items0 = ring.items[0] || {};
      const ringTitle = items0.ring_name ?? items0.ringName ?? items0.ring_nickname ?? items0.ringNickname ?? `Ring ${ring.ring_number}`;

      const groups = Array.from(groupBy(ring.items, r => String(r.class_group_id ?? r.classGroupId ?? "")).entries())
        .map(([gid, items]) => {
          const seq = toInt(items[0]?.class_group_sequence ?? items[0]?.classGroupSequence ?? 9999) ?? 9999;
          const gname = items[0]?.group_group_name ?? items[0]?.group_name ?? items[0]?.groupName ?? "Group";
          const gd = normRollup(items.map(x => x.group_display).filter(Boolean).join(", "));
          return { gid, seq, gname, gdisplay: gd, items };
        })
        .sort((a,b)=>a.seq - b.seq);

      const sec = document.createElement("section");
      sec.className = "ring";
      sec.innerHTML = `<div class="ring-head">${esc(ringTitle)}</div>`;

      for(const g of groups){
        const classes = g.items.slice().sort((a,b)=>{
          const an = toInt(a.class_number ?? a.classNumber ?? 999999) ?? 999999;
          const bn = toInt(b.class_number ?? b.classNumber ?? 999999) ?? 999999;
          return an - bn;
        });

        let cl = "";
        let lastTime = null;
        for(const c of classes){
          const time = String(c.start_display ?? c.startDisplay ?? "").trim();
          const showTime = (time && time !== lastTime);
          if(time) lastTime = time;

          const num = c.class_number ?? c.classNumber;
          const name = c.class_name ?? c.className ?? c.name ?? "";
          const label = (num !== undefined && num !== null && String(num).trim() !== "" && String(num) !== "0")
            ? `${num} - ${name}`.trim()
            : String(name).trim();

          cl += `<div class="c"><div class="t">${esc(showTime ? time : "")}</div><div class="n">${esc(label)}</div></div>`;
        }

        const gDiv = document.createElement("div");
        gDiv.className = `group${g.gdisplay ? " has-team" : ""}`;
        gDiv.innerHTML = `
          <div class="group-head">
            ${g.gdisplay ? `<div class="gdisplay">${esc(g.gdisplay)}</div>` : ``}
            <div class="gname">${esc(g.gname)}</div>
          </div>
          <div class="class-list">${cl || `<div class="muted">No classes scheduled.</div>`}</div>
        `;
        sec.appendChild(gDiv);
      }

      ringEls.push(sec);
    }

    return ringEls;
  }

  async function generateOnePagePdf(){
    const btn = document.getElementById("btnPdf");
    btn.disabled = true;

    try{
      // Make sure layout is finalized and fitted to 1 page BEFORE capture.
      fitToOnePage();
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      const page = document.getElementById("page");

      // Hide controls in the capture
      const controls = document.querySelector(".controls");
      const oldDisplay = controls ? controls.style.display : "";
      if(controls) controls.style.display = "none";

      const canvas = await html2canvas(page, {
        scale: Math.min(2, window.devicePixelRatio || 2),
        backgroundColor: "#fff",
        useCORS: true
      });

      if(controls) controls.style.display = oldDisplay;

      const imgData = canvas.toDataURL("image/png");

      const jspdfNS = window.jspdf;
      if(!jspdfNS || !jspdfNS.jsPDF) throw new Error("jsPDF not loaded");
      const { jsPDF } = jspdfNS;

      const doc = new jsPDF({ orientation:"portrait", unit:"pt", format:"letter", compress:true });
      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();

      doc.addImage(imgData, "PNG", 0, 0, W, H, undefined, "FAST");

      const blob = doc.output("blob");
      const url = URL.createObjectURL(blob);

      const w = window.open(url, "_blank");
      if(!w) window.location.href = url;

      setTimeout(() => URL.revokeObjectURL(url), 60_000);
    } finally {
      btn.disabled = false;
    }
  }

  (async function main(){
    const url = resolveDataUrl();
    const rows = await fetchJson(url);

    if(!Array.isArray(rows) || rows.length === 0){
      document.getElementById("colL").innerHTML = `<div class="muted">No schedule rows.</div>`;
      return;
    }

    const ringEls = buildRingElements(rows);

    // Ensure ring order is based on ring_number, and rings are never split.
    placeRingsBalanced(ringEls);

    // Fit to one letter page (maximize font first; scale only last)
    fitToOnePage();
    setTimeout(fitToOnePage, 50);

    window.addEventListener("resize", ()=>{ fitToOnePage(); });

    document.getElementById("btnPdf").addEventListener("click", generateOnePagePdf);
  })().catch(err=>{
    document.getElementById("colL").innerHTML = `<div class="err">${esc(String(err && err.stack ? err.stack : err))}</div>`;
  });
</script>
</body>
</html>
