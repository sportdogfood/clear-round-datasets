<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ring Status — Schedule</title>
  <style>
    :root{
      --bg0:#020617;
      --bg1:#000814;
      --fg:#eef2ff;
      --muted:rgba(238,242,255,.62);
      --stroke:rgba(148,163,184,.18);
      --stroke2:rgba(148,163,184,.12);
      --surface:rgba(15,23,42,.72);
      --surface2:rgba(17,24,39,.62);
      --chip:rgba(255,255,255,.06);
      --chip2:rgba(255,255,255,.10);
      --accent:#2563eb;
      --good:#10b981;
      --warn:#ef4444;

      --radius:18px;
      --radius2:22px;
      --pad:14px;
      --maxw:600px;

      /* line column mins */
      --col-time:68px;
      --col-num:62px;
      --col-badge:44px;
    }

    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--fg);
      background:
        radial-gradient(1200px 700px at 50% -200px, rgba(37,99,235,.25), transparent 55%),
        radial-gradient(900px 600px at 20% 20%, rgba(16,185,129,.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    .app{
      min-height:100vh;
      max-width:var(--maxw);
      margin:0 auto;
      padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      padding-top:8px;
      background: linear-gradient(180deg, rgba(2,6,23,.92), rgba(2,6,23,.45) 70%, transparent);
      backdrop-filter: blur(10px);
    }
    .topbar__inner{
      display:grid;
      grid-template-columns: auto 1fr auto;
      align-items:center;
      gap:10px;
      padding:10px;
      border:1px solid var(--stroke2);
      border-radius:var(--radius2);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: 0 10px 30px rgba(0,0,0,.25) inset;
    }
    .topbtn{
      width:110px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      box-shadow: 0 8px 20px rgba(0,0,0,.25) inset;
      color:var(--fg);
      font-size:14px;
    }
    .topbtn:active{transform:translateY(1px)}
    .topbar__c{
      text-align:center;
      font-weight:700;
      letter-spacing:.2px;
      font-size:18px;
      color:rgba(255,255,255,.92);
    }

    .wrapCard{
      border:1px solid var(--stroke2);
      border-radius:var(--radius2);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: 0 18px 40px rgba(0,0,0,.30) inset;
      overflow:hidden;
    }

    .peaks, .horses{ padding:10px; }
    .peakbar, .horsebar{
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom:6px;
      scrollbar-width:none;
    }
    .peakbar::-webkit-scrollbar,.horsebar::-webkit-scrollbar{display:none}

    .pill{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      box-shadow: 0 8px 18px rgba(0,0,0,.24) inset;
      color:rgba(255,255,255,.92);
      font-weight:650;
      font-size:16px;
      white-space:nowrap;
      cursor:pointer;
    }
    .pill.is-active{
      border-color: rgba(37,99,235,.85);
      background: rgba(37,99,235,.18);
    }

    .main{
      flex:1;
      min-height:0;
      padding-bottom:10px;
    }

    .rings_container{ display:flex; flex-direction:column; gap:12px; }

    .ring{
      border:1px solid var(--stroke2);
      border-radius:var(--radius2);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: 0 18px 40px rgba(0,0,0,.30) inset;
      overflow:hidden;
    }
    .ring_top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 14px;
      border-bottom:1px solid var(--stroke2);
      background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
    }
    .ring_title{
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
    }

    /* CLASS LINE — 4 divs: time | number | name | badge */
    .class_line{
      width:100%;
      border:0;
      background: transparent;
      color:inherit;
      display:grid;
      grid-template-columns: minmax(var(--col-time), auto) minmax(var(--col-num), auto) 1fr minmax(var(--col-badge), auto);
      align-items:center;
      gap:12px;
      padding:12px 14px;
      border-bottom:1px solid var(--stroke2);
      position:relative;
      text-align:left;
    }
    .class_line:last-child{border-bottom:0}
    .class_line::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:4px;
      background: rgba(37,99,235,.55); /* default U */
    }
    .class_line[data-status="C"]::before{ background: rgba(16,185,129,.75); }
    .class_line[data-status="L"]::before{ background: rgba(239,68,68,.75); }

    .cl_time{ min-width:var(--col-time); font-weight:700; color:rgba(255,255,255,.70); }
    .cl_num{ min-width:var(--col-num); font-weight:900; letter-spacing:.2px; }
    .cl_name{ min-width:140px; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cl_badge{
      min-width:var(--col-badge);
      display:flex;
      justify-content:flex-end;
      align-items:center;
    }
    .badge_dot{
      width:28px; height:28px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      box-shadow: 0 10px 20px rgba(0,0,0,.25) inset;
    }

    /* ROLLUP LINE — only rendered when pills exist */
    .rollup_line{
      display:grid;
      grid-template-columns: minmax(var(--col-time), auto) minmax(var(--col-num), auto) 1fr minmax(var(--col-badge), auto);
      align-items:center;
      gap:12px;
      padding:10px 14px 14px 14px;
      border-bottom:1px solid var(--stroke2);
    }
    .rollup_line:last-child{ border-bottom:0; }
    .rl_time,.rl_num,.rl_badge{ min-height:1px; }
    .rl_time{ min-width:var(--col-time); }
    .rl_num{ min-width:var(--col-num); }
    .rl_scroller{
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom:4px;
      scrollbar-width:none;
    }
    .rl_scroller::-webkit-scrollbar{display:none}

    .entry_pill{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      box-shadow: 0 10px 22px rgba(0,0,0,.24) inset;
      color:rgba(255,255,255,.92);
      font-weight:700;
      white-space:nowrap;
      cursor:pointer;
    }

    /* bottom nav */
    .bottomnav{
      position:sticky;
      bottom:0;
      z-index:60;
      padding: 8px 0 10px 0;
      background: linear-gradient(0deg, rgba(2,6,23,.96), rgba(2,6,23,.40) 70%, transparent);
      backdrop-filter: blur(10px);
    }
    .nav-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding: 10px;
      border:1px solid var(--stroke2);
      border-radius:var(--radius2);
      background: rgba(255,255,255,.03);
      box-shadow: 0 14px 34px rgba(0,0,0,.30) inset;
    }
    .nav-btn{
      height:54px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      box-shadow: 0 10px 22px rgba(0,0,0,.24) inset;
      color:rgba(255,255,255,.90);
      font-weight:850;
      letter-spacing:.2px;
      font-size:18px;
      cursor:pointer;
    }
    .nav-btn.is-active{
      border-color: rgba(37,99,235,.85);
      background: rgba(37,99,235,.18);
      color:#fff;
    }

    /* Flyup */
    .fly{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:100;
      padding: 0 10px env(safe-area-inset-bottom) 10px;
    }
    .fly.is-open{ display:flex; }
    .flyCard{
      width:100%;
      max-width:var(--maxw);
      border:1px solid var(--stroke2);
      border-radius:26px;
      background: linear-gradient(180deg, rgba(15,23,42,.98), rgba(2,6,23,.98));
      box-shadow: 0 30px 80px rgba(0,0,0,.50);
      overflow:hidden;
    }
    .flyTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 14px;
      border-bottom:1px solid var(--stroke2);
    }
    .flyTitle{
      font-weight:900;
      letter-spacing:.2px;
      font-size:20px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .flyClose{
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      box-shadow: 0 10px 22px rgba(0,0,0,.24) inset;
      color:rgba(255,255,255,.92);
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
    }
    .flyBody{ padding: 12px 14px 16px 14px; }
    .flyRows{ display:flex; flex-direction:column; gap:10px; }
    .flyRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 12px;
      border:1px solid var(--stroke2);
      border-radius:16px;
      background: rgba(255,255,255,.03);
    }
    .flyLabel{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:800; }
    .flyValue{ font-size:16px; font-weight:800; color:rgba(255,255,255,.92); text-align:right; }

    .empty{
      padding: 22px 14px;
      color: rgba(255,255,255,.68);
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="app" id="app">

    <div class="topbar" id="topbar">
      <div class="topbar__inner">
        <button class="topbtn" id="topLeft" type="button" aria-label="Left"></button>
        <div class="topbar__c" id="topTitle">Lite</div>
        <button class="topbtn" id="topRight" type="button" aria-label="Right"></button>
      </div>
    </div>

    <div class="wrapCard" id="peaksWrap">
      <div class="peaks">
        <div class="peakbar" id="peakbar"></div>
      </div>
    </div>

    <div class="wrapCard" id="horsesWrap">
      <div class="horses">
        <div class="horsebar" id="horsebar"></div>
      </div>
    </div>

    <div class="main" id="main">
      <div class="rings_container" id="rings_container"></div>
    </div>

    <div class="bottomnav" id="bottomnav">
      <div class="nav-grid" id="navGrid">
        <button class="nav-btn" data-view="start" type="button">Start</button>
        <button class="nav-btn" data-view="summary" type="button">Summary</button>
        <button class="nav-btn is-active" data-view="lite" type="button">Lite</button>
        <button class="nav-btn" data-view="full" type="button">Full</button>
      </div>
    </div>

  </div>

  <div class="fly" id="fly" aria-hidden="true">
    <div class="flyCard" role="dialog" aria-modal="true" aria-label="Details">
      <div class="flyTop">
        <div class="flyTitle" id="flyTitle">Details</div>
        <button class="flyClose" id="flyClose" type="button">Close</button>
      </div>
      <div class="flyBody">
        <div class="flyRows" id="flyRows"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
