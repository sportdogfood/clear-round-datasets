<!-- index.html (FULL DROP) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tap-Active — Rings (v2.1)</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070b14;
      --surface: rgba(15, 20, 35, .58);
      --surface2: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.10);
      --line2: rgba(255,255,255,.14);

      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.62);

      --accent:#2f6bff;

      --r-2: 12px;
      --r-pill: 999px;

      /* dense-mobile (target ~370-390vw) */
      --fs-0: 9.75px;
      --fs-1: 10.5px;
      --fs-2: 11.25px;
      --fs-3: 12px;
      --fs-4: 13px;

      --topbar-h: 48px;
      --nav-h: 62px;
      --peaks-h: 74px; /* global U/L/C + rings peaks */
      --horses-h: 54px;

      /* row grammar */
      --row-a: 52px;  /* left slot (time) */
      --row-end: 18px; /* right endcap */

      --pad: 10px;
      --gap: 8px;
    }

    @media (max-width: 380px){
      :root{
        --row-a: 48px;
        --fs-0: 9.5px;
        --fs-1: 10.25px;
        --fs-2: 11px;
        --fs-3: 11.75px;
        --fs-4: 12.75px;
      }
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 700px at 50% -20%, rgba(47,107,255,.16), rgba(0,0,0,0) 55%),
        radial-gradient(900px 520px at 10% 0%, rgba(255,255,255,.06), rgba(0,0,0,0) 55%),
        var(--bg);
      color: var(--text);
      overflow:hidden;
    }
    a{ color: inherit; text-decoration:none; }
    [hidden]{ display:none !important; }

    /* ---------------------------------------------------------
       APP CHROME + SCROLL BEHAVIOR
    --------------------------------------------------------- */
    .app{
      width:100%;
      height:100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;

      /* dynamic offsets (change when chrome hides) */
      --peaks-top: calc(env(safe-area-inset-top) + var(--topbar-h) + 8px);
      --horses-bottom: calc(env(safe-area-inset-bottom) + var(--nav-h) + 10px);
    }
    .app.chrome--hidden{
      --peaks-top: 20px;
      --horses-bottom: 20px;
    }

    .topbar{
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--topbar-h) + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      z-index: 50;
      background: rgba(7,11,20,.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      transition: transform .18s ease;
    }
    .app.chrome--hidden .topbar{
      transform: translateX(-50%) translateY(calc(-1 * (var(--topbar-h) + env(safe-area-inset-top))));
    }
    .topbar__inner{
      height: var(--topbar-h);
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding: 0 var(--pad);
      gap: 8px;
    }
    .topbar__l,
    .topbar__r{
      min-width: 28px;
      height: 28px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      opacity: .45;
    }
    .topbar__c{
      font-size: var(--fs-3);
      font-weight: 500;
      letter-spacing: .01em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
      color: rgba(255,255,255,.92);
      line-height: 1.1;
      user-select:none;
    }

    .bottomnav{
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 40;
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(7,11,20,.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .18s ease;
    }
    .app.chrome--hidden .bottomnav{
      transform: translateX(-50%) translateY(calc(var(--nav-h) + env(safe-area-inset-bottom) + 6px));
    }
    .nav-scroller{
      height: var(--nav-h);
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px var(--pad);
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .nav-scroller::-webkit-scrollbar{ display:none; }
    .nav-btn{
      height: 42px;
      min-width: 92px;
      padding: 0 12px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.88);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      font-size: var(--fs-2);
      font-weight: 500;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
    }
    .nav-btn:active{ transform: translateY(1px) scale(.995); }
    .nav-btn.is-active{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.16);
      color:#fff;
    }
    .nav-agg{
      min-width: 26px;
      height: 22px;
      padding: 0 8px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.92);
      font-size: var(--fs-1);
      font-variant-numeric: tabular-nums;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .nav-agg.is-on{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.18);
      color:#fff;
    }

    /* MAIN scroll */
    .main{
      position: relative;
      height: 100vh;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(env(safe-area-inset-top) + var(--topbar-h) + var(--peaks-h) + 22px) var(--pad)
               calc(env(safe-area-inset-bottom) + var(--nav-h) + var(--horses-h) + 18px);
      scrollbar-width: none;
    }
    .main::-webkit-scrollbar{ display:none; }

    /* ---------------------------------------------------------
       PEAKS (GLOBAL U/L/C + RING PEAKS)
       --------------------------------------------------------- */
    .peaksWrap{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: var(--peaks-top);
      width: 100%;
      max-width: 480px;
      z-index: 45;
      padding: 0 var(--pad);
      transition: top .18s ease;
      pointer-events: none; /* allow only inner controls */
    }
    .peaks{
      pointer-events: auto;
      border-radius: var(--r-2);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px;
      display:grid;
      gap: 8px;
    }

    /* Global status controls */
    .statusbar{
      display:flex;
      gap: 8px;
      align-items:center;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .statusbar::-webkit-scrollbar{ display:none; }

    .sbtn{
      height: 28px;
      min-width: 34px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-size: var(--fs-2);
      font-weight: 500;
      letter-spacing: .02em;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      cursor:pointer;
      line-height: 1;
      white-space:nowrap;
    }
    .sbtn:active{ transform: translateY(1px) scale(.995); }
    .sbtn.is-on{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.16);
      color:#fff;
    }

    /* Ring peaks (jump) */
    .peakbar{
      display:flex;
      gap: 8px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
      padding-bottom: 1px;
    }
    .peakbar::-webkit-scrollbar{ display:none; }
    .peakbtn{
      height: 30px;
      min-width: 44px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-size: var(--fs-2);
      font-weight: 500;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
      line-height: 1;
    }
    .peakbtn:active{ transform: translateY(1px) scale(.995); }
    .peakbtn.is-active{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.16);
      color:#fff;
    }

    /* ---------------------------------------------------------
       HORSES (single filter chips)
    --------------------------------------------------------- */
    .horsesWrap{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: var(--horses-bottom);
      width: 100%;
      max-width: 480px;
      z-index: 44;
      padding: 0 var(--pad);
      transition: bottom .18s ease;
      pointer-events: none;
    }
    .horses{
      pointer-events: auto;
      border-radius: var(--r-2);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px;
    }
    .horsebar{
      display:flex;
      gap: 8px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .horsebar::-webkit-scrollbar{ display:none; }
    .hchip{
      height: 30px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-size: var(--fs-2);
      font-weight: 500;
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
    }
    .hchip:active{ transform: translateY(1px) scale(.995); }
    .hchip.is-on{
      border-color: rgba(47,107,255,.55);
      background: rgba(47,107,255,.16);
      color:#fff;
    }

    /* ---------------------------------------------------------
       RINGS / CLASSES / ENTRIES
    --------------------------------------------------------- */
    .rings_container{
      display:grid;
      gap: 12px;
    }

    .ring_card{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: var(--r-2);
      overflow:hidden;
    }

    /* Ring head (1 line only) */
    .ring_line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
    }
    .ring_title{
      font-size: var(--fs-3);
      font-weight: 500;
      color: rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
    }
    .ring_eyelid{
      display:flex;
      gap: 6px;
      align-items:center;
      flex: 0 0 auto;
    }
    .ring_eyelid .sbtn{
      height: 26px;
      min-width: 30px;
      padding: 0 9px;
      font-size: var(--fs-2);
    }

    /* group container (css-only grouping hook) */
    .class_group_id{
      padding: 6px 0 10px;
      display:grid;
      gap: 8px;
    }

    /* Row-line base */
    .row--tap{ user-select:none; }
    .row--line{
      width:100%;
      display:grid;
      grid-template-columns: var(--row-a) minmax(0,1fr) var(--row-end);
      gap: 8px;
      align-items:center;
      padding: 8px 10px;
    }

    .row__l{
      font-size: var(--fs-2);
      color: rgba(255,255,255,.72);
      font-variant-numeric: tabular-nums;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-height: 1em;
      line-height: 1.1;
    }

    /* Renamed mid + right per your instruction */
    .line__m{
      min-width:0;
      min-height: 1em;
      line-height: 1.1;
    }
    .line__r{
      justify-self:end;
      width: var(--row-end);
      height: 18px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }

    /* Class line (1 line only) */
    .line--class{
      cursor:pointer;
    }
    .line--class .line__m{
      font-size: var(--fs-3);
      font-weight: 500;
      color: rgba(255,255,255,.90);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .line--class:active{ transform: translateY(1px); }

    /* Entries line (tightened to belong to class) */
    .line--entries{
      padding-top: 4px;
      padding-bottom: 8px;
      margin-top: -2px;
    }
    .line--entries .row__l{ color: rgba(255,255,255,.40); }
    .entries_scroller{
      display:flex;
      gap: 8px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
      padding-bottom: 2px;
    }
    .entries_scroller::-webkit-scrollbar{ display:none; }

    .epill{
      height: 26px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      font-size: var(--fs-1);
      font-weight: 500;
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
      flex: 0 0 auto;
    }
    .epill:active{ transform: translateY(1px) scale(.995); }

    /* status tint (subtle, by class status) */
    .class_card[data-status="L"] .line--class{ box-shadow: inset 3px 0 0 rgba(255,90,122,.45); }
    .class_card[data-status="C"] .line--class{ box-shadow: inset 3px 0 0 rgba(61,220,151,.45); }
    .class_card[data-status="U"] .line--class{ box-shadow: inset 3px 0 0 rgba(77,163,255,.45); }

    /* visibility helpers */
    .is-hidden{ display:none !important; }

    /* ---------------------------------------------------------
       PAGES (minimal)
    --------------------------------------------------------- */
    .page{ display:none; }
    .page.is-active{ display:block; }

    /* ---------------------------------------------------------
       FLYUPS (simple)
    --------------------------------------------------------- */
    .fly{
      position: fixed;
      inset: 0;
      z-index: 1000;
      display:none;
    }
    .fly.is-open{ display:block; }
    .fly_backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.55);
    }
    .fly_sheet{
      position:absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 480px;
      border-radius: 16px 16px 0 0;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(7,11,20,.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 12px calc(env(safe-area-inset-bottom) + 14px);
    }
    .fly_head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 10px;
    }
    .fly_title{
      font-size: var(--fs-3);
      font-weight: 500;
      color: rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height: 1.1;
    }
    .fly_close{
      height: 32px;
      min-width: 52px;
      padding: 0 12px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.88);
      font-size: var(--fs-2);
      font-weight: 500;
      cursor:pointer;
      user-select:none;
    }
    .fly_close:active{ transform: translateY(1px) scale(.995); }
    .fly_body{
      display:grid;
      gap: 8px;
      color: rgba(255,255,255,.86);
      font-size: var(--fs-2);
      line-height: 1.35;
    }
    .fly_kv{
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      border-radius: 12px;
      padding: 10px;
    }
    .fly_k{ color: rgba(255,255,255,.62); font-size: var(--fs-1); letter-spacing:.08em; text-transform: uppercase; }
    .fly_v{ margin-top: 4px; color: rgba(255,255,255,.92); font-size: var(--fs-3); font-weight: 500; }

    /* Focus */
    :is(.sbtn,.peakbtn,.hchip,.nav-btn,.epill,.fly_close):focus-visible{
      outline: 2px solid rgba(47,107,255,.95);
      outline-offset: 2px;
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <!-- TOPBAR (3 divs, centered title, no subs) -->
    <div class="topbar" id="topbar">
      <div class="topbar__inner">
        <div class="topbar__l" aria-hidden="true"></div>
        <div class="topbar__c" id="topTitle">Start</div>
        <div class="topbar__r" aria-hidden="true"></div>
      </div>
    </div>

    <!-- PEAKS (global U/L/C + ring peaks) -->
    <div class="peaksWrap" id="peaksWrap">
      <div class="peaks">
        <div class="statusbar" aria-label="Global status filter">
          <button class="sbtn" type="button" data-global-status="U" title="Upcoming">U</button>
          <button class="sbtn" type="button" data-global-status="L" title="Live">L</button>
          <button class="sbtn" type="button" data-global-status="C" title="Completed">C</button>
        </div>

        <div class="peakbar" id="peakbar" aria-label="Ring peaks">
          <!-- built by JS -->
        </div>
      </div>
    </div>

    <!-- HORSES (single filter chips) -->
    <div class="horsesWrap" id="horsesWrap">
      <div class="horses">
        <div class="horsebar" id="horsebar" aria-label="Horse filter chips">
          <!-- built by JS -->
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main">
      <!-- Start -->
      <div class="page is-active" id="page-start">
        <div class="rings_container" id="start_container"></div>
      </div>

      <!-- Summary -->
      <div class="page" id="page-summary">
        <div class="rings_container" id="summary_container"></div>
      </div>

      <!-- Lite -->
      <div class="page" id="page-lite">
        <div class="rings_container" id="lite_container"></div>
      </div>

      <!-- Full -->
      <div class="page" id="page-full">
        <div class="rings_container" id="full_container"></div>
      </div>

      <!-- Threads -->
      <div class="page" id="page-threads">
        <div class="rings_container" id="threads_container"></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottomnav" id="bottomnav">
      <div class="nav-scroller" aria-label="Bottom navigation">
        <div class="nav-btn is-active" data-nav="start"><span>Start</span><span class="nav-agg" id="aggStart">—</span></div>
        <div class="nav-btn" data-nav="summary"><span>Summary</span><span class="nav-agg" id="aggSummary">—</span></div>
        <div class="nav-btn" data-nav="lite"><span>Lite</span><span class="nav-agg" id="aggLite">—</span></div>
        <div class="nav-btn" data-nav="full"><span>Full</span><span class="nav-agg" id="aggFull">—</span></div>
        <div class="nav-btn" data-nav="threads"><span>Threads</span><span class="nav-agg" id="aggThreads">—</span></div>
      </div>
    </div>

    <!-- FLYUP -->
    <div class="fly" id="fly">
      <div class="fly_backdrop" id="flyBackdrop"></div>
      <div class="fly_sheet" role="dialog" aria-modal="true" aria-label="Details">
        <div class="fly_head">
          <div class="fly_title" id="flyTitle">Details</div>
          <button class="fly_close" type="button" id="flyClose">Close</button>
        </div>
        <div class="fly_body" id="flyBody"></div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
