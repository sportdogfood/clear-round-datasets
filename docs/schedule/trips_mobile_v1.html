<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CRT Trips (Mobile)</title>

<style>
/* Tap-Active Locked UI Kit — v1.2 (patched + Boards)
   NOTE: unchanged kit; schedule/trips view styles added at bottom.
*/

/* =========================
   TOKENS
========================= */
:root{
  /* Core */
  --bg:#020617;
  --bg-grad-1:#111827;
  --bg-grad-2:#020617;
  --fg:#f9fafb;
  --fg-soft:#e5e7eb;
  --muted:rgba(209,213,219,.85);

  /* Surfaces */
  --surface-1:#111827;   /* rows, inputs, nav */
  --surface-2:#18181b;   /* tags, chips */
  --header-surface:#020617;

  /* Lines */
  --border:#374151;
  --border-soft:#4b5563;

  /* Accent */
  --accent:#2563eb;
  --accent-2:#1d4ed8;
  --accent-3:#1e3a8a;

  /* Geometry */
  --pill-radius:999px;
  --card-radius:24px;
  --header-h:52px;

  /* Type */
  --fs-btn:14px;
  --fs-row:14px;
  --fs-tag:11px;
  --fs-label:12px;
  --fs-title:16px;

  /* Shadows */
  --shadow-app:0 24px 70px rgba(0,0,0,0.95);
  --shadow-press:0 2px 8px rgba(15,23,42,.95);

  /* Motion */
  --t-fast:.08s;
  --t-med:.12s;

  /* Locked sizing */
  --h-row:46px;           /* rows + inputs */
  --h-btn:40px;           /* ALL buttons cap */
  --pad-row-y:10px;
  --pad-row-x:16px;

  --gap:10px;
  --nav-pad-top:10px;
  --nav-pad-bottom:12px;

  /* Desktop phone-canvas cap */
  --app-maxw:480px;
  --app-maxh:920px;

  /* Boards tokens (kept; unused here) */
  --yW: clamp(84px, 26vw, 140px);
  --rowH: 62px;
  --slotW: 92px;
  --slotGap: 2px;
  --xTopH: 42px;

  --fs-0: 10px;
  --fs-1: 11px;
  --fs-2: 12px;
  --fs-3: 13px;

  --w-30: 66px;
  --w-60: 66px;

  --export-w: 1200px;
  --export-h: 2500px;
}

@media (max-width: 390px){
  :root{
    --h-row:44px;
    --h-btn:40px;

    --pad-row-y:9px;
    --pad-row-x:14px;

    --fs-btn:13px;
    --fs-row:13px;
    --fs-title:15px;

    --gap:8px;

    --slotW: 86px;
    --fs-0: 9.75px;
    --fs-1: 10.75px;
    --fs-2: 11.75px;
    --fs-3: 12.75px;
    --yW: clamp(80px, 28vw, 132px);
  }
}

/* =========================
   RESET
========================= */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
[hidden]{ display:none !important; }

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background: radial-gradient(circle at top, var(--bg) 0, var(--bg) 40%, #000 90%);
  color:var(--fg);
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}

button,input,a{ font:inherit; }
button{ max-height: var(--h-btn); }

:focus{ outline:none; }
:focus-visible{
  outline:2px solid rgba(37,99,235,.55);
  outline-offset:2px;
}

/* =========================
   SHELL (LOCKED CANVAS)
========================= */
.page{
  min-height:100vh;
  min-height:100dvh;
  padding:12px;
  display:flex;
  justify-content:center;
  align-items:stretch;
}

.app{
  width:100%;
  max-width: var(--app-maxw);
  height: calc(100vh - 24px);
  height: calc(100dvh - 24px);
  max-height: var(--app-maxh);
  margin:0 auto;

  display:flex;
  flex-direction:column;

  background:var(--bg);
  border-radius:var(--card-radius);
  border:1px solid rgba(15, 23, 42, 0.95);
  box-shadow:var(--shadow-app);
  overflow:hidden;

  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

.app-header{
  height:var(--header-h);
  flex:0 0 auto;
  display:flex;
  align-items:center;
  padding:0 12px;
  border-bottom:1px solid rgba(31,41,55,.95);
  background:var(--header-surface);
  backdrop-filter: blur(10px);
  gap:10px;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:var(--fs-title);
  font-weight:600;
  margin:0;
  padding:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.is-invisible{ visibility:hidden; pointer-events:none; }

.header-back,
.header-action{
  min-width:60px;
  height:34px;
  padding:0 16px;
  border-radius:var(--pill-radius);
  border:1px solid var(--border-soft);
  background:var(--header-surface);
  color:var(--fg-soft);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  box-shadow:
    0 0 0 1px rgba(15,23,42,1),
    0 3px 10px rgba(0,0,0,.8);
  transition:
    background var(--t-med) ease-out,
    border-color var(--t-med) ease-out,
    transform var(--t-fast) ease-out,
    box-shadow var(--t-med) ease-out,
    color var(--t-med) ease-out;
  text-decoration:none;
}
.header-action{
  border-color: rgba(59,130,246,1);
  background: radial-gradient(circle at top, var(--accent-2), var(--accent-3) 75%);
  color:var(--fg);
}
.header-back:active,
.header-action:active{
  transform: translateY(1px) scale(.97);
  box-shadow:
    0 0 0 1px rgba(15,23,42,1),
    0 2px 6px rgba(0,0,0,.9);
}

.app-main{
  flex:1 1 auto;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:10px 12px 14px;
  background: radial-gradient(circle at top, var(--bg-grad-1) 0, var(--bg-grad-2) 52%);
}

.list-column{
  width:100%;
  max-width:474px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap: var(--gap);
  min-height:100%;
  padding-bottom: calc(12px + var(--h-btn) + var(--nav-pad-bottom) + env(safe-area-inset-bottom));
}

.row{
  width:100%;
  max-width:474px;
  margin:0 auto;
  min-height: var(--h-row);
  padding: var(--pad-row-y) var(--pad-row-x);
  border-radius:var(--pill-radius);
  border:1px solid var(--border-soft);
  background:var(--surface-1);
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:var(--fs-row);
  color:var(--fg-soft);
  box-shadow:0 1px 0 var(--bg);
  text-decoration:none;
}
.row-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:8px;
}
.row-tag{
  min-width:28px;
  padding:3px 10px;
  border-radius:var(--pill-radius);
  border:1px solid var(--border-soft);
  background:var(--surface-2);
  color:var(--fg-soft);
  font-size:var(--fs-tag);
  text-align:center;
  font-variant-numeric: tabular-nums;
  box-shadow:0 0 0 1px var(--bg);
  white-space:nowrap;
}

.chip-strip{
  display:flex;
  gap:8px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding: 2px 2px 4px;
  margin: 0;
  scrollbar-width:none;
}
.chip-strip::-webkit-scrollbar{ display:none; }

.chip{
  padding:3px 10px;
  border-radius:var(--pill-radius);
  border:1px solid var(--border-soft);
  background:var(--surface-2);
  color:var(--fg-soft);
  font-size:var(--fs-tag);
  font-weight:600;
  box-shadow:0 0 0 1px var(--bg);
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
  transition:
    transform var(--t-fast) ease-out,
    box-shadow var(--t-med) ease-out,
    border-color var(--t-med) ease-out,
    background var(--t-med) ease-out;
}
.chip:active{
  transform: translateY(1px) scale(.995);
  box-shadow:
    0 0 0 1px var(--bg),
    var(--shadow-press);
}
.chip.is-active{
  border-color: var(--accent);
  background: radial-gradient(circle at top, #1f2937, var(--bg) 75%);
  color:var(--fg);
  box-shadow:
    0 0 0 1px var(--bg),
    0 4px 10px rgba(15,23,42,.75);
}

.app-nav{
  flex:0 0 auto;
  border-top:1px solid rgba(31,41,55,.95);
  background:var(--header-surface);
  padding: var(--nav-pad-top) 12px var(--nav-pad-bottom);
}
.nav-strip{
  width:100%;
  max-width:474px;
  margin:0 auto;
  display:flex;
  gap:var(--gap);
}
.nav-btn{
  flex:1 1 0;
  height: var(--h-btn);
  border-radius:var(--pill-radius);
  border:1px solid var(--border-soft);
  background:var(--surface-1);
  color:var(--fg-soft);
  font-size:var(--fs-btn);
  font-weight:600;
  cursor:pointer;
  user-select:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:
    transform var(--t-fast) ease-out,
    box-shadow var(--t-med) ease-out,
    border-color var(--t-med) ease-out,
    background var(--t-med) ease-out;
  box-shadow:0 1px 0 var(--bg);
  white-space:nowrap;
  text-decoration:none;
}
.nav-btn:active{
  transform: translateY(1px) scale(.995);
  box-shadow:
    0 0 0 1px var(--bg),
    var(--shadow-press);
}
.nav-btn.is-active{
  border-color: var(--accent);
  background: radial-gradient(circle at top, #1f2937, var(--bg) 75%);
  box-shadow:
    0 0 0 1px var(--bg),
    0 4px 10px rgba(15,23,42,.75);
  color:var(--fg);
}

@media (max-width: 520px){
  .page{ padding:0; }
  .app{
    max-width:100%;
    height:100vh;
    height:100dvh;
    max-height:none;
    border-radius:0;
  }
}
@media (min-width: 521px){
  .page{ align-items:center; }
}
@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; }
}

/* =========================
   TRIPS VIEW (watch_trips.json)
========================= */

.boardMeta{
  margin: -2px 2px 0;
  padding: 0 2px 2px;
  font-size:12px;
  color: rgba(229,231,235,.78);
  line-height:1.2;
}

.filtersSticky{
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 10px 0 8px;
  background: radial-gradient(circle at top, var(--bg-grad-1) 0, var(--bg-grad-2) 52%);
  border-bottom: 1px solid rgba(31,41,55,.55);
}

.rings{
  display:flex;
  flex-direction:column;
  gap: var(--gap);
}

.ringCard{
  border: 1px solid rgba(75,85,99,.85);
  border-radius: 18px;
  overflow: hidden;
  background: rgba(17,24,39,.55);
  box-shadow:
    0 0 0 1px rgba(2,6,23,.65),
    0 10px 28px rgba(0,0,0,.45);
  scroll-margin-top: 96px; /* header + sticky filters (approx) */
}

.ringHead{
  padding: 10px 12px;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: rgba(229,231,235,.92);
  background: linear-gradient(180deg, rgba(37,99,235,.22), rgba(37,99,235,.06));
  border-bottom: 1px solid rgba(31,41,55,.85);
}

.group{
  border-top: 1px solid rgba(31,41,55,.55);
  padding: 0;
}
.group:first-of-type{ border-top: 0; }

.group.has-team{ background: rgba(255,255,255,0.03); }
.group.has-team[data-status="upcoming"]{ background: rgba(37,99,235,.10); }
.group.has-team[data-status="underway"]{ background: rgba(34,197,94,.10); }
.group.has-team[data-status="completed"]{ background: rgba(209,213,219,.06); }

.group-head{ padding: 8px 12px 0; }

.gdisplay{
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: rgba(229,231,235,.88);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
  margin-bottom: -1px;
}
.gname{ display:none; }

.class-list{ padding: 6px 10px 10px; }

.classRow{
  display:grid;
  grid-template-columns: 78px 1fr auto; /* time | label | status */
  gap: 10px;
  align-items: center;
  line-height: 1.1;
  padding: 8px 8px;
  border-radius: 12px;
  border: 1px solid rgba(75,85,99,.25);
  background: rgba(2,6,23,.18);
  margin-top: 6px;
}
.classRow:first-child{ margin-top: 0; }

.classRow .t{
  font-weight: 900;
  font-size: 12px;
  color: rgba(229,231,235,.92);
  white-space: nowrap;
}
.classRow .n{
  font-size: 13px;
  color: rgba(229,231,235,.92);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.classRow .s{
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(229,231,235,.70);
  white-space: nowrap;
  padding-left: 4px;
}

.group .class-list > .classRow:nth-child(even){
  background: rgba(255,255,255,0.04);
}

.err{
  white-space:pre-wrap;
  color: rgba(255,255,255,.92);
  background: rgba(244,63,94,.10);
  border: 1px solid rgba(244,63,94,.35);
  border-radius: 18px;
  padding: 12px;
  font-size: 12px;
}
</style>
</head>

<body>
  <div class="page">
    <div class="app">

      <header class="app-header">
        <a class="header-back" href="https://ringstatus.com">Home</a>
        <h1 class="header-title" id="title">Trips</h1>
        <button class="header-action is-invisible" type="button" aria-hidden="true">.</button>
      </header>

      <main class="app-main" id="appMain">
        <div class="list-column">

          <div class="boardMeta" id="subtitle"></div>

          <div class="filtersSticky" id="filterBar" aria-label="Trips Filters">
            <div class="chip-strip" id="horseFilters"></div>
            <div class="chip-strip" id="statusFilters"></div>
          </div>

          <div id="rings" class="rings"></div>

        </div>
      </main>

      <nav class="app-nav" id="bottomNav" aria-label="Ring Navigation">
        <div class="nav-strip" id="ringNav"></div>
      </nav>

    </div>
  </div>

<script>
  // Poll the JSON for changes
  const POLL_MS = 6 * 60 * 1000;

  // Publish cadence (for subtitle "next:")
  const PUBLISH_INTERVAL_MS = 8 * 60 * 1000;

  const TIMEZONE = "America/New_York";

  // Filters (persist across refresh)
  let activeHorse = "__all__";
  let activeStatus = "__all__";

  const qs = new URLSearchParams(location.search);
  const rawHash = (location.hash || "").replace(/^#/, "").trim();

  let activeIO = null;
  let lastRaw = null;
  let lastLastMod = null;
  let currentDataUrl = null;
  let isRefreshing = false;

  // server-published time (ms) based on Last-Modified header
  let publishedAtMs = null;

  // dataset meta (if present)
  let dataMeta = null;

  const scroller = ()=>document.getElementById("appMain");

  const fmtTimeET = (ms)=>{
    return new Intl.DateTimeFormat("en-US", {
      timeZone: TIMEZONE,
      hour: "numeric",
      minute: "2-digit"
    }).format(new Date(ms));
  };

  const esc = (s)=>String(s??"").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const toInt = (v)=>{ const n = Number(v); return Number.isFinite(n) ? n : null; };

  function normalizeShowDay(v){
    const s = String(v ?? "").trim();
    if(!s) return "";
    if(/^\d{8}$/.test(s)) return s;
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m) return `${m[1]}${m[2]}${m[3]}`;
    return "";
  }

  function resolveDataUrl(){
    // primary: explicit file
    const q = qs.get("data");
    if(q) return q;

    // optional: show_id + dt -> {show_id}-{YYYYMMDD}T.json
    const showId = (qs.get("show_id") || qs.get("showId") || "").trim();
    const dtRaw = (qs.get("dt") || qs.get("date") || qs.get("show_day") || qs.get("showDay") || "").trim();
    const ymd = normalizeShowDay(dtRaw || "");
    if(showId && ymd){
      return `${showId}-${ymd}T.json`;
    }

    // back-compat: hash like "200000052-20260301T" (optional .json)
    if(/^\d+\-\d{8}T?(\.json)?$/i.test(rawHash)){
      let base = rawHash.replace(/\.json$/i, "");
      if(!/T$/i.test(base)) base = base + "T";
      const file = base + ".json";

      const next = new URL(location.href);
      next.searchParams.set("data", file);
      next.hash = "";
      history.replaceState(null, "", next.toString());
      return file;
    }

    // default: co-located with watch_schedule.json
    return "watch_trips.json";
  }

  function groupBy(arr, keyFn){
    const m = new Map();
    for(const it of arr){
      const k = keyFn(it);
      if(!m.has(k)) m.set(k, []);
      m.get(k).push(it);
    }
    return m;
  }

  function normalizeStatusToken(s){
    const v = String(s ?? "").trim().toLowerCase();
    if(v === "upcoming") return "upcoming";
    if(v === "underway") return "underway";
    if(v === "completed") return "completed";
    return "";
  }

  function computeGroupStatusFromTrips(items){
    // Priority: Underway > Upcoming > Completed (all)
    let hasUnderway = false;
    let hasUpcoming = false;
    let hasCompleted = false;
    let sawAny = false;
    let sawNonCompleted = false;

    for(const r of items){
      const s = String(r.latestStatus ?? r.status2 ?? r.status ?? "").trim();
      if(!s) continue;
      sawAny = true;
      if(s === "Underway") hasUnderway = true;
      else if(s === "Upcoming") hasUpcoming = true;
      else if(s === "Completed") hasCompleted = true;
      else sawNonCompleted = true;
      if(s !== "Completed") sawNonCompleted = true;
    }

    if(hasUnderway) return "Underway";
    if(hasUpcoming) return "Upcoming";
    if(sawAny && hasCompleted && !sawNonCompleted) return "Completed";
    return "";
  }

  function computeGroupDisplay(items){
    // Build "Horse (OOG)" list; dedupe by horse
    const tmp = [];
    const seen = new Set();

    for(const r of items){
      const horse = String(r.horseName ?? "").trim();
      if(!horse) continue;
      const key = horse.toLowerCase();
      if(seen.has(key)) continue;
      seen.add(key);

      const oog = String(r.lastOOG ?? "").trim();
      const oogNum = toInt(oog);
      tmp.push({
        horse,
        oog: oogNum,
        oogRaw: oog
      });
    }

    tmp.sort((a,b)=>{
      const ao = (a.oog === null ? 999999 : a.oog);
      const bo = (b.oog === null ? 999999 : b.oog);
      if(ao !== bo) return ao - bo;
      return a.horse.localeCompare(b.horse);
    });

    return tmp.map(x => x.oog !== null ? `${x.horse} (${x.oog})` : x.horse).join(", ");
  }

  async function fetchTextMeta(url){
    const res = await fetch(url, {cache:"no-store"});
    const txt = await res.text();
    if(!res.ok) throw new Error(`Fetch failed ${res.status} for ${url}: ${txt.slice(0,200)}`);
    const lastMod = res.headers.get("last-modified");
    return { txt, lastMod };
  }

  function parseTripsPayload(txt, urlLabel){
    // Accept either:
    // A) object { meta, records: [...] }  (watch_trips)
    // B) array [...]
    try{
      const obj = JSON.parse(txt);
      if(Array.isArray(obj)) return { rows: obj, meta: null };
      if(obj && Array.isArray(obj.records)) return { rows: obj.records, meta: obj.meta || null };
      throw new Error("Unexpected JSON shape (expected array or {records:[]}).");
    }catch(e){
      throw new Error(`Bad JSON in ${urlLabel}: ${String(e && e.message ? e.message : e)} :: ${String(txt).slice(0,200)}`);
    }
  }

  function updatePublishedFromHeader(lastMod){
    if(!lastMod) return;
    const ms = Date.parse(lastMod);
    if(Number.isFinite(ms)) publishedAtMs = ms;
  }

  function setHeader(rows){
    const first = rows[0] || {};

    const sid = first.sid ?? "";
    const dt  = first.dt  ?? "";

    const title = sid ? `Show ${sid} Trips` : "Trips";
    document.getElementById("title").textContent = title;

    const subParts = [];
    if(dt) subParts.push(String(dt));

    if(dataMeta && dataMeta.table) subParts.push(String(dataMeta.table));
    if(dataMeta && Number.isFinite(Number(dataMeta.record_count))) subParts.push(`rows: ${dataMeta.record_count}`);

    // prefer meta.generated_at; fallback to Last-Modified header
    if(dataMeta && dataMeta.generated_at){
      subParts.push(`gen: ${String(dataMeta.generated_at).replace("T", " ").replace(/-05:00$/," ET")}`);
    }else if(publishedAtMs){
      subParts.push(`published: ${fmtTimeET(publishedAtMs)}`);
      subParts.push(`next: ${fmtTimeET(publishedAtMs + PUBLISH_INTERVAL_MS)}`);
    }

    document.getElementById("subtitle").textContent = subParts.join("   •   ");
  }

  function buildRings(rows){
    const rings = Array.from(groupBy(rows, r => String(r.ring_number ?? r.ringNumber ?? "9999")).entries())
      .map(([k, items]) => ({ ring_number: toInt(k) ?? 9999, items }))
      .sort((a,b)=>a.ring_number - b.ring_number);

    const ringEls = [];

    for(let i=0;i<rings.length;i++){
      const ring = rings[i];
      const items0 = ring.items[0] || {};
      const ringTitle = items0.ringName ?? items0.ring_name ?? items0.ringNickname ?? items0.ring_nickname ?? "Ring";

      const ringId = (Number.isFinite(ring.ring_number) && ring.ring_number !== 9999)
        ? `ring-${ring.ring_number}`
        : `ring-x${i+1}`;

      const groups = Array.from(groupBy(ring.items, r => String(r.class_group_id ?? r.classGroupId ?? "")).entries())
        .map(([gid, items]) => {
          const seq = toInt(items[0]?.class_group_sequence ?? items[0]?.classGroupSequence ?? 9999) ?? 9999;
          const gname = items[0]?.group_name ?? items[0]?.groupName ?? "Group";
          const gdisplay = computeGroupDisplay(items);
          const gstatus = computeGroupStatusFromTrips(items);
          return { gid, seq, gname, gdisplay, gstatus, items };
        })
        .sort((a,b)=>a.seq - b.seq);

      const sec = document.createElement("section");
      sec.className = "ringCard ring";
      sec.id = ringId;
      sec.dataset.ringTitle = String(ringTitle);

      sec.innerHTML = `<div class="ringHead">${esc(ringTitle)}</div>`;

      for(const g of groups){
        // Dedup to unique classes within the group (watch_trips is trip-level)
        const classMap = groupBy(g.items, x => String(x.class_id ?? x.classId ?? ""));
        const classes = Array.from(classMap.entries())
          .map(([cid, items]) => {
            const row0 = items[0] || {};
            const classNum = row0.class_number ?? row0.classNumber ?? "";
            const className = row0.class_name ?? row0.className ?? "";
            const latestStart = String(row0.latestStart ?? "").trim();
            const estStart = String(row0.estimated_start_time ?? "").trim();
            const displayTime = latestStart || estStart || "";
            const status2 = String(row0.latestStatus ?? "").trim();
            const tSort = toInt(row0.time_sort ?? "") ?? 999999;
            return {
              cid,
              tSort,
              classNum,
              className,
              displayTime,
              status2
            };
          })
          .sort((a,b)=>{
            if(a.tSort !== b.tSort) return a.tSort - b.tSort;
            const an = toInt(a.classNum) ?? 999999;
            const bn = toInt(b.classNum) ?? 999999;
            if(an !== bn) return an - bn;
            return String(a.className).localeCompare(String(b.className));
          });

        let cl = "";
        let lastTime = null;

        for(const c of classes){
          const showTime = (c.displayTime && c.displayTime !== lastTime);
          if(showTime) lastTime = c.displayTime;

          const label = (String(c.classNum).trim() && String(c.classNum) !== "0")
            ? `${c.classNum} - ${c.className}`.trim()
            : String(c.className).trim();

          const statusHtml = c.status2 ? `<div class="s">${esc(c.status2)}</div>` : `<div class="s"></div>`;

          cl += `
            <div class="classRow">
              <div class="t">${esc(showTime ? c.displayTime : "")}</div>
              <div class="n">${esc(label)}</div>
              ${statusHtml}
            </div>
          `;
        }

        // filter metadata
        const horses = Array.from(new Set(
          g.items.map(x=>String(x.horseName ?? "").trim()).filter(Boolean).map(h=>h.toLowerCase())
        ));
        const horsesNorm = horses.join("|");
        const statusNorm = normalizeStatusToken(g.gstatus);

        const gDiv = document.createElement("div");
        const hasTeam = !!g.gdisplay;

        gDiv.className = `group${hasTeam ? " has-team" : ""}`;
        if(hasTeam){
          if(horsesNorm) gDiv.dataset.horses = horsesNorm;
          if(statusNorm) gDiv.dataset.status = statusNorm;
        }

        gDiv.innerHTML = `
          <div class="group-head">
            ${g.gdisplay ? `<div class="gdisplay">${esc(g.gdisplay)}</div>` : ``}
            <div class="gname">${esc(g.gname)}</div>
          </div>
          <div class="class-list">${cl || `<div class="row"><div class="row-title">No classes.</div></div>`}</div>
        `;

        sec.appendChild(gDiv);
      }

      ringEls.push(sec);
    }

    return ringEls;
  }

  function buildBottomNav(ringEls){
    const nav = document.getElementById("ringNav");
    nav.innerHTML = "";

    for(const sec of ringEls){
      const b = document.createElement("button");
      b.type = "button";
      b.className = "nav-btn";
      b.dataset.target = sec.id;
      b.textContent = sec.dataset.ringTitle || "Ring";
      b.addEventListener("click", ()=>{
        const el = document.getElementById(sec.id);
        if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
        try{ history.replaceState(null, "", `${location.pathname}${location.search}#${sec.id}`); }catch(e){}
      });
      nav.appendChild(b);
    }
  }

  function destroyActiveRingObserver(){
    if(activeIO){
      try { activeIO.disconnect(); } catch(e){}
      activeIO = null;
    }
  }

  function setupActiveRingObserver(){
    destroyActiveRingObserver();

    const rootEl = scroller();
    if(!rootEl) return;

    const buttons = Array.from(document.querySelectorAll("#ringNav .nav-btn"));
    const sections = Array.from(document.querySelectorAll("section.ring"))
      .filter(sec => sec.style.display !== "none");

    const btnById = new Map();
    for(const b of buttons) btnById.set(b.dataset.target, b);

    const clearActive = ()=>buttons.forEach(b=>b.classList.remove("is-active"));
    const filtersH = (document.getElementById("filterBar")?.getBoundingClientRect().height || 0);

    activeIO = new IntersectionObserver((entries)=>{
      const vis = entries
        .filter(e=>e.isIntersecting)
        .sort((a,b)=> (b.intersectionRatio - a.intersectionRatio));

      if(!vis.length) return;

      const id = vis[0].target.id;
      clearActive();
      const btn = btnById.get(id);
      if(btn) btn.classList.add("is-active");
    }, {
      root: rootEl,
      rootMargin: `-${filtersH + 10}px 0px -40% 0px`,
      threshold: [0.2, 0.35, 0.5, 0.65]
    });

    sections.forEach(sec=>activeIO.observe(sec));
  }

  /* ----------------------------
     FILTERS
  -----------------------------*/

  function collectHorseCandidatesFromDOM(){
    const horseSet = new Set();
    const groups = Array.from(document.querySelectorAll(".group.has-team"));
    for(const g of groups){
      const horses = String(g.dataset.horses ?? "").trim();
      if(!horses) continue;
      horses.split("|").map(x=>x.trim()).filter(Boolean).forEach(h=>horseSet.add(h));
    }
    return Array.from(horseSet)
      .map(h=>({ key: h, label: h }))
      .sort((a,b)=>a.label.localeCompare(b.label));
  }

  function prettyHorseLabel(h){
    const s = String(h||"").trim();
    if(!s) return "";
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function prettyStatusLabel(k){
    const t = String(k||"").toLowerCase();
    if(t === "upcoming") return "Upcoming";
    if(t === "underway") return "Underway";
    if(t === "completed") return "Completed";
    return k;
  }

  function makeChipButton({text, value, active, onClick}){
    const b = document.createElement("button");
    b.type = "button";
    b.className = "chip" + (active ? " is-active" : "");
    b.textContent = text;
    b.dataset.value = value;
    b.addEventListener("click", onClick);
    return b;
  }

  function updateFilterUI(){
    for(const b of Array.from(document.querySelectorAll("#horseFilters .chip"))){
      b.classList.toggle("is-active", b.dataset.value === activeHorse);
    }
    for(const b of Array.from(document.querySelectorAll("#statusFilters .chip"))){
      b.classList.toggle("is-active", b.dataset.value === activeStatus);
    }
  }

  function applyFilters(){
    const groups = Array.from(document.querySelectorAll(".group.has-team"));

    const needHorse = activeHorse !== "__all__";
    const needStatus = activeStatus !== "__all__";

    const horseKey = String(activeHorse).toLowerCase();
    const statusKey = String(activeStatus).toLowerCase();

    // 1) groups
    for(const g of groups){
      let ok = true;

      if(needHorse){
        const horses = String(g.dataset.horses ?? "");
        ok = ok && horses.split("|").map(x=>x.trim()).includes(horseKey);
      }

      if(needStatus){
        const st = String(g.dataset.status ?? "").trim().toLowerCase();
        ok = ok && (st === statusKey);
      }

      g.style.display = ok ? "" : "none";
    }

    // 2) rings + nav buttons
    const ringSections = Array.from(document.querySelectorAll("section.ring"));
    const ringNavBtns = Array.from(document.querySelectorAll("#ringNav .nav-btn"));

    const navById = new Map();
    for(const b of ringNavBtns){
      const id = b.dataset.target;
      if(id) navById.set(id, b);
    }

    for(const sec of ringSections){
      const teamGroups = Array.from(sec.querySelectorAll(".group.has-team"));
      const anyVisible = teamGroups.some(g => g.style.display !== "none");

      sec.style.display = anyVisible ? "" : "none";

      const btn = navById.get(sec.id);
      if(btn) btn.style.display = anyVisible ? "" : "none";
    }

    setupActiveRingObserver();
  }

  function renderFilters(){
    const horsesList = collectHorseCandidatesFromDOM();

    const horseWrap = document.getElementById("horseFilters");
    const statusWrap = document.getElementById("statusFilters");

    horseWrap.innerHTML = "";
    statusWrap.innerHTML = "";

    for(const h of horsesList){
      horseWrap.appendChild(makeChipButton({
        text: prettyHorseLabel(h.label),
        value: h.key,
        active: activeHorse === h.key,
        onClick: ()=>{
          activeHorse = (activeHorse === h.key) ? "__all__" : h.key;
          updateFilterUI();
          applyFilters();
        }
      }));
    }

    for(const k of ["upcoming","underway","completed"]){
      statusWrap.appendChild(makeChipButton({
        text: prettyStatusLabel(k),
        value: k,
        active: activeStatus === k,
        onClick: ()=>{
          activeStatus = (activeStatus === k) ? "__all__" : k;
          updateFilterUI();
          applyFilters();
        }
      }));
    }

    const horseExists = activeHorse === "__all__" || horsesList.some(x=>x.key === activeHorse);
    if(!horseExists) activeHorse = "__all__";

    updateFilterUI();
    applyFilters();
  }

  /* ----------------------------
     RENDER + REFRESH
  -----------------------------*/

  function renderRows(rows){
    const ringsEl = document.getElementById("rings");

    if(!Array.isArray(rows) || rows.length === 0){
      ringsEl.innerHTML = `<div class="row"><div class="row-title">No trips.</div></div>`;
      destroyActiveRingObserver();
      document.getElementById("horseFilters").innerHTML = "";
      document.getElementById("statusFilters").innerHTML = "";
      document.getElementById("ringNav").innerHTML = "";
      return;
    }

    setHeader(rows);

    const ringEls = buildRings(rows);

    ringsEl.innerHTML = "";
    for(const el of ringEls) ringsEl.appendChild(el);

    buildBottomNav(ringEls);
    renderFilters();
    setupActiveRingObserver();

    // If URL hash points to a ring, scroll it into view (after render)
    const h = (location.hash || "").replace(/^#/, "");
    if(/^ring\-/i.test(h)){
      const target = document.getElementById(h);
      if(target){
        setTimeout(()=>target.scrollIntoView({behavior:"smooth", block:"start"}), 50);
      }
    }
  }

  async function initialLoad(){
    currentDataUrl = resolveDataUrl();

    const { txt, lastMod } = await fetchTextMeta(currentDataUrl);
    lastRaw = txt;
    lastLastMod = lastMod || null;
    updatePublishedFromHeader(lastMod);

    const parsed = parseTripsPayload(txt, currentDataUrl);
    dataMeta = parsed.meta;
    renderRows(parsed.rows);
  }

  async function pollForUpdates(){
    if(isRefreshing) return;
    if(!currentDataUrl) return;

    isRefreshing = true;
    try{
      const { txt, lastMod } = await fetchTextMeta(currentDataUrl);

      const lmChanged = !!(lastMod && lastLastMod && lastMod !== lastLastMod);
      const bodyChanged = (lastRaw !== null && txt !== lastRaw);

      if(!lmChanged && !bodyChanged){
        return;
      }

      lastLastMod = lastMod || lastLastMod;
      updatePublishedFromHeader(lastMod);

      const parsed = parseTripsPayload(txt, currentDataUrl);

      const rootEl = scroller();
      const keepTop = rootEl ? rootEl.scrollTop : 0;

      lastRaw = txt;
      dataMeta = parsed.meta;
      renderRows(parsed.rows);

      if(rootEl) rootEl.scrollTop = keepTop;

    }catch(e){
      // keep existing UI
    }finally{
      isRefreshing = false;
    }
  }

  (async function main(){
    await initialLoad();
    setInterval(pollForUpdates, POLL_MS);
    window.addEventListener("resize", ()=>{ setupActiveRingObserver(); });
  })().catch(err=>{
    document.getElementById("rings").innerHTML =
      `<div class="err">${esc(String(err && err.stack ? err.stack : err))}</div>`;
  });
</script>

</body>
